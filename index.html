<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Team Haungs</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Haungs 10B">
<meta name="theme-color" content="#C22818">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23C22818'/%3E%3Ctext x='90' y='120' font-size='90' text-anchor='middle' fill='white'%3E%E2%9A%BE%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
[data-theme="light"]{
  --bg:#F4F1E8;--panel:#FFFFFF;--panel2:#F0EDE3;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --ink:#0F1209;--ink2:#2e2e22;--muted:#6b6955;
  --clay:#C22818;--clay-d:#9E1A0A;--clay-l:#E03828;
  --grass:#1a7a38;--grass-l:#228a45;
  --gold:#9a6800;--good:#1a7a38;--warn:#b05a00;--bad:#b01818;--teal:#0a6a62;
  --tab-bg:#E2DED2;--tab-text:#5a5845;--shadow:rgba(0,0,0,0.10);
  --hot:#c03010;--cold:#0a6a80;
}
[data-theme="dark"]{
  --bg:#14181a;--panel:#1c2124;--panel2:#222a2e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --ink:#edeae2;--ink2:#ccc9be;--muted:rgba(237,234,226,0.45);
  --clay:#C2553A;--clay-d:#9E3E26;--clay-l:#e8705a;
  --grass:#2a5c3a;--grass-l:#3a7a50;
  --gold:#d4a84b;--good:#4caf72;--warn:#e0943a;--bad:#e05a5a;--teal:#3a8a82;
  --tab-bg:#1c2124;--tab-text:rgba(237,234,226,0.45);--shadow:rgba(0,0,0,0.35);
  --hot:#ff7043;--cold:#4dd0e1;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif;min-height:100%;padding:0;max-width:430px;margin:0 auto;-webkit-text-size-adjust:100%;transition:background 0.2s,color 0.2s;}

/* STICKY HEADER WRAPPER */
.sticky-top{position:sticky;top:0;z-index:200;background:var(--bg);transition:background 0.2s;padding:max(env(safe-area-inset-top),12px) 14px 0;}

/* HEADER */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:10px;border-bottom:2px solid var(--border2);}
.hdr-left{display:flex;flex-direction:column;gap:2px;}
.logo{display:inline-flex;background:var(--clay);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:2.5px;padding:3px 10px;border-radius:20px;font-weight:700;margin-bottom:2px;}
.htitle{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:800;line-height:1;color:var(--ink);}
.htitle em{color:var(--clay);font-style:normal;}
.hsub{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:2px;color:var(--muted);font-weight:600;}
.save-ind{font-size:0.62rem;color:var(--good);letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;opacity:0;transition:opacity 0.4s;height:13px;display:block;font-weight:700;margin-top:2px;}
.save-ind.show{opacity:1;}
.theme-btn{width:54px;height:30px;border-radius:30px;background:var(--panel2);border:2px solid var(--border2);cursor:pointer;position:relative;flex-shrink:0;margin-top:2px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.theme-btn::before{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--clay);transition:transform 0.22s;}
[data-theme="dark"] .theme-btn::before{transform:translateX(24px);}
.theme-icons{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 5px;font-size:0.7rem;pointer-events:none;}

/* TAB BAR — inside sticky wrapper */
.tab-bar{display:grid;grid-template-columns:repeat(5,1fr);background:var(--tab-bg);border-radius:10px;padding:4px;gap:2px;margin:8px 0 0;border:1.5px solid var(--border2);box-shadow:0 2px 6px var(--shadow);}
.tab-btn{padding:9px 2px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:1.5px;color:var(--tab-text);cursor:pointer;border-radius:8px;border:none;background:none;font-weight:700;min-height:44px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all 0.18s;}
.tab-btn.active{background:var(--clay);color:#fff;}

/* OFFLINE BAR */
.offline-bar{display:none;background:var(--warn);color:#fff;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:2px;font-weight:700;padding:6px 14px;}
.offline-bar.show{display:block;}

/* TAB CONTENT */
.tab-content{display:none;}
.tab-content.active{display:block;}
.tab-scroll{padding:14px 14px max(env(safe-area-inset-bottom),30px);}

/* SECTION LABEL */
.slabel{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;letter-spacing:3px;color:var(--muted);margin-bottom:9px;font-weight:700;}

/* BATTING */
.batting-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.brow{display:grid;grid-template-columns:34px 32px 1fr 64px 36px;align-items:center;gap:7px;background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;padding:9px 10px;box-shadow:0 1px 4px var(--shadow);user-select:none;-webkit-user-select:none;}
.brow.drag-over{border-color:var(--clay);box-shadow:0 0 0 2px var(--clay);}
.brow.dragging{opacity:0.4;}
.drag-handle{font-size:1.1rem;color:var(--muted);text-align:center;cursor:grab;touch-action:none;padding:6px 2px;min-height:44px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.bnum{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;color:var(--clay);text-align:center;line-height:1;}
.bnum.gold{color:var(--gold);}
.bname{font-weight:700;font-size:0.9rem;color:var(--ink);line-height:1.2;}
.bsub{font-size:0.68rem;color:var(--muted);margin-top:1px;}
.bstat{font-size:0.68rem;color:var(--good);margin-top:1px;font-weight:700;}
.bstreak{font-size:0.65rem;font-weight:700;margin-top:1px;}
.bstreak.hot{color:var(--hot);}
.bstreak.cold{color:var(--cold);}
.pos-sel{background:var(--panel2);border:1.5px solid var(--border2);color:var(--ink);font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;font-weight:700;border-radius:7px;padding:5px 3px;width:100%;cursor:pointer;appearance:none;text-align:center;min-height:36px;}
.pos-sel:focus{outline:none;border-color:var(--clay);}
.arrow-btns{display:flex;flex-direction:column;gap:3px;}
.arr{width:36px;height:44px;background:var(--panel2);border:1.5px solid var(--border2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:var(--ink2);-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all 0.15s;}
.arr:active,.arr:hover{background:var(--clay);border-color:var(--clay);color:#fff;}
.arr:disabled{opacity:0.18;pointer-events:none;}

/* DRAG GHOST — floating card under finger during touch drag */
.drag-ghost{
  position:fixed;
  z-index:9999;
  pointer-events:none;
  opacity:0.94;
  transform:scale(1.03) rotate(1deg);
  box-shadow:0 10px 36px rgba(0,0,0,0.32),0 0 0 2px var(--clay);
  border-radius:11px;
  background:var(--panel);
  border:1.5px solid var(--clay);
  transition:none;
  left:0;top:0;
  will-change:transform;
}
.drag-ghost .arr{display:none;}
.drag-ghost .drag-handle{color:var(--clay);}

/* Live reorder — rows shift to open a gap where the card will land */
.brow{transition:transform 0.2s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.16s ease;}
.brow.dragging{opacity:0.22;transform:scale(0.97);}
.brow.shift-down{transform:translateY(calc(var(--row-h,72px) + 6px));}
.brow.shift-up{transform:translateY(calc(-1 * (var(--row-h,72px) + 6px)));}
.steal-card{background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;padding:13px 14px;margin-bottom:14px;box-shadow:0 2px 6px var(--shadow);}
.steal-dots{display:flex;gap:10px;align-items:center;margin-bottom:6px;}
.sdot{width:46px;height:46px;border-radius:50%;border:2.5px solid var(--border2);background:var(--panel2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--muted);-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all 0.18s;}
.sdot.used{background:var(--clay);border-color:var(--clay);color:#fff;}
.sreset{font-size:0.75rem;color:var(--clay);background:none;border:none;padding:4px 0;text-decoration:underline;font-weight:700;cursor:pointer;display:block;margin-top:4px;}

/* DEFENSE */
.iblock{background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;margin-bottom:9px;overflow:hidden;box-shadow:0 2px 6px var(--shadow);}
.iblock-hdr{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--panel2);border-bottom:1.5px solid var(--border2);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.iblock-hdr-left{flex:1;}
.iblock-title{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;letter-spacing:2px;color:var(--ink);font-weight:800;}
.iblock-bench{font-size:0.7rem;color:var(--clay);margin-top:1px;font-weight:700;}
.iblock-chev{color:var(--muted);font-size:0.7rem;transition:transform 0.2s;}
.iblock-hdr.open .iblock-chev{transform:rotate(180deg);}
.iblock-body{display:none;padding:11px;}
.iblock-body.open{display:block;}
.bench-row{display:flex;align-items:center;gap:10px;background:rgba(194,40,24,0.07);border:1.5px solid rgba(194,40,24,0.25);border-radius:8px;padding:8px 11px;margin-bottom:9px;}
.bench-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:2px;color:var(--clay);white-space:nowrap;font-weight:700;}
.bench-sel{flex:1;background:transparent;border:none;color:var(--clay);font-family:'Barlow',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;appearance:none;}
.suggest-btn{background:var(--clay);color:#fff;border:none;border-radius:6px;padding:7px 12px;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:2px;cursor:pointer;font-weight:700;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.suggest-btn:active{background:var(--clay-d);}
.def-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.def-cell{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1.5px solid var(--border2);border-radius:8px;padding:7px 10px;}
.def-pos{font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;color:var(--clay);min-width:26px;letter-spacing:1px;font-weight:800;}
.def-psel{flex:1;background:transparent;border:none;color:var(--ink);font-size:0.82rem;font-weight:700;cursor:pointer;appearance:none;}
.fit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fit-g{background:var(--good);}
.fit-o{background:var(--warn);}
.fit-w{background:var(--bad);}
.fit-legend{display:flex;gap:12px;margin-bottom:9px;flex-wrap:wrap;}
.fit-legend span{font-size:0.67rem;color:var(--muted);display:flex;align-items:center;gap:4px;font-weight:600;}
.rot-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:2px;padding:3px 9px;border-radius:12px;margin-bottom:8px;font-weight:700;}
.rot-good{background:rgba(26,122,56,0.12);color:var(--good);border:1px solid rgba(26,122,56,0.3);}
.rot-warn{background:rgba(176,90,0,0.12);color:var(--warn);border:1px solid rgba(176,90,0,0.3);}

/* FAIR PLAY MODE */
.fp-banner{display:flex;align-items:center;gap:10px;background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;padding:11px 13px;margin-bottom:10px;box-shadow:0 2px 6px var(--shadow);}
.fp-icon{font-size:1.2rem;flex-shrink:0;}
.fp-text{flex:1;}
.fp-label{font-family:'Barlow Condensed',sans-serif;font-size:0.88rem;letter-spacing:1.5px;font-weight:800;color:var(--ink);}
.fp-sub{font-size:0.67rem;color:var(--muted);margin-top:1px;line-height:1.4;}
.fp-toggle{position:relative;width:48px;height:27px;flex-shrink:0;}
.fp-toggle input{opacity:0;width:0;height:0;position:absolute;}
.fp-slider{position:absolute;inset:0;background:var(--panel2);border:1.5px solid var(--border2);border-radius:27px;cursor:pointer;transition:all 0.22s;}
.fp-slider::before{content:'';position:absolute;top:3px;left:3px;width:17px;height:17px;border-radius:50%;background:var(--muted);transition:all 0.22s;}
.fp-toggle input:checked+.fp-slider{background:var(--grass);border-color:var(--grass-l);}
.fp-toggle input:checked+.fp-slider::before{transform:translateX(21px);background:#fff;}
.fp-compliance{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.fp-chip{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:1px;padding:3px 8px;border-radius:10px;font-weight:700;}
.fp-chip-ok{background:rgba(26,122,56,0.12);color:var(--good);border:1px solid rgba(26,122,56,0.3);}
.fp-chip-warn{background:rgba(176,90,0,0.12);color:var(--warn);border:1px solid rgba(176,90,0,0.3);}

/* SETTINGS */
.spc{background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 6px var(--shadow);}
.spc-hdr{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--panel2);border-bottom:1.5px solid var(--border2);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.spc-name{font-family:'Barlow Condensed',sans-serif;font-size:0.98rem;font-weight:800;color:var(--ink);flex:1;}
.spc-rank{font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;color:var(--gold);background:rgba(154,104,0,0.12);border:1.5px solid rgba(154,104,0,0.3);border-radius:5px;padding:2px 8px;font-weight:700;}
.spc-body{display:none;padding:11px 13px;}
.spc-body.open{display:block;}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.srow label{font-size:0.75rem;color:var(--muted);min-width:68px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:700;}
.ninput{background:var(--panel2);border:1.5px solid var(--border2);color:var(--ink);border-radius:7px;padding:5px 8px;font-size:0.9rem;font-family:'Barlow Condensed',sans-serif;width:58px;text-align:center;font-weight:700;}
.ninput:focus{outline:none;border-color:var(--clay);}
.pos-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.ptog{display:flex;align-items:center;background:var(--panel2);border:1.5px solid var(--border2);border-radius:7px;padding:5px 9px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.14s;}
.ptog.pri{background:rgba(194,40,24,0.10);border-color:var(--clay);}
.ptog.sec{background:rgba(10,106,98,0.10);border-color:var(--teal);}
.ptog-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;letter-spacing:1px;color:var(--muted);font-weight:700;}
.ptog.pri .ptog-lbl{color:var(--clay);}
.ptog.sec .ptog-lbl{color:var(--teal);}
.pos-legend{display:flex;gap:12px;margin-bottom:9px;flex-wrap:wrap;}
.pos-legend span{font-size:0.68rem;color:var(--muted);display:flex;align-items:center;gap:4px;font-weight:600;}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.btn-green{width:100%;padding:12px;background:var(--grass);color:#fff;border:none;border-radius:9px;font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;letter-spacing:3px;cursor:pointer;font-weight:700;margin-top:5px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-red-outline{width:100%;padding:11px;background:transparent;color:var(--bad);border:1.5px solid var(--bad);border-radius:9px;font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;letter-spacing:2px;cursor:pointer;margin-top:8px;font-weight:700;-webkit-tap-highlight-color:transparent;}

/* STATS */
.upload-zone{background:var(--panel);border:2.5px dashed var(--border2);border-radius:12px;padding:22px 16px;text-align:center;margin-bottom:10px;box-shadow:0 2px 6px var(--shadow);}
.upload-zone.over{border-color:var(--clay);}
.upload-h{font-family:'Barlow Condensed',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--ink);margin-bottom:4px;font-weight:800;}
.upload-p{font-size:0.77rem;color:var(--muted);line-height:1.5;margin-bottom:10px;}
.btn-clay{display:inline-block;background:var(--clay);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;letter-spacing:2px;padding:8px 18px;border-radius:8px;cursor:pointer;border:none;font-weight:700;-webkit-tap-highlight-color:transparent;}
.gamelog{background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 6px var(--shadow);}
.gamelog h4{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:2px;color:var(--clay);margin-bottom:10px;font-weight:800;}
.glog-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.glog-row:last-child{border-bottom:none;}
.glog-num{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:1px;color:var(--muted);min-width:52px;font-weight:700;}
.glog-label{font-size:0.82rem;color:var(--ink);font-weight:700;flex:1;}
.glog-delta{font-size:0.72rem;color:var(--good);font-weight:700;}
.glog-del{font-size:0.7rem;color:var(--bad);cursor:pointer;background:none;border:1.5px solid var(--bad);padding:3px 8px;border-radius:5px;font-weight:700;-webkit-tap-highlight-color:transparent;}
.stats-note{background:rgba(26,122,56,0.09);border:1.5px solid rgba(26,122,56,0.3);border-radius:9px;padding:10px 13px;margin-bottom:10px;font-size:0.78rem;color:var(--ink2);line-height:1.5;}
.stats-note strong{color:var(--good);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;display:block;margin-bottom:3px;font-weight:800;}
.btn-clear{background:transparent;border:1.5px solid var(--bad);color:var(--bad);font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:2px;padding:6px 12px;border-radius:7px;cursor:pointer;margin-bottom:10px;font-weight:700;}
.stats-hdr{display:grid;grid-template-columns:1fr repeat(6,36px);gap:3px;padding:5px 10px;margin-bottom:4px;}
.stats-hdr span{font-family:'Barlow Condensed',sans-serif;font-size:0.63rem;letter-spacing:2px;color:var(--muted);text-align:center;font-weight:700;}
.stats-hdr span:first-child{text-align:left;}
.stat-row{display:grid;grid-template-columns:1fr repeat(6,36px);gap:3px;align-items:center;background:var(--panel);border:1.5px solid var(--border2);border-radius:9px;padding:7px 10px;margin-bottom:5px;box-shadow:0 1px 3px var(--shadow);}
.sp{font-size:0.83rem;font-weight:700;color:var(--ink);}
.ssub{font-size:0.65rem;color:var(--muted);font-weight:600;}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:0.87rem;text-align:center;font-weight:700;color:var(--ink2);}
.sv.hi{color:var(--good);}
.sv.mid{color:var(--warn);}
.sv.lo{color:var(--muted);}
.sv.ba{font-size:0.94rem;}
.sstreak{font-size:0.65rem;font-weight:700;}
.sstreak.hot{color:var(--hot);}
.sstreak.cold{color:var(--cold);}

/* AWARDS */
.award-badge{display:inline-flex;align-items:center;background:rgba(26,122,56,0.10);border:1.5px solid rgba(26,122,56,0.3);border-radius:6px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:0.67rem;letter-spacing:2px;color:var(--good);margin-bottom:10px;font-weight:700;}
.award-intro{background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;padding:12px 14px;margin-bottom:10px;font-size:0.8rem;color:var(--ink2);line-height:1.55;box-shadow:0 2px 6px var(--shadow);}
.acard{background:var(--panel);border:1.5px solid var(--border2);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 2px 8px var(--shadow);}

<body>

<!-- Offline indicator -->
<div class="offline-bar" id="offlineBar">⚡ OFFLINE MODE — DATA SAVED LOCALLY</div>

<!-- Hidden PDF card — populated on demand, shown only on print -->
<div id="pdf-card" style="display:none;"></div>

<!-- Sticky header + tabs -->
<div class="sticky-top">
  <div class="hdr">
    <div class="hdr-left">
      <div class="logo">⚾ TVL MINORS 10B</div>
      <div class="htitle">TEAM <em>HAUNGS</em></div>
      <div class="hsub">COACH'S PLAYBOOK</div>
      <span class="save-ind" id="saveInd">✓ SAVED</span>
    </div>
    <div class="theme-btn" onclick="toggleTheme()" title="Toggle light/dark">

    </div>

<!-- Tab content -->

<div id="tab-defense"  class="tab-content"><div class="tab-scroll" id="sc-defense"></div></div>

<div id="tab-awards"   class="tab-content"><div class="tab-scroll" id="sc-awards"></div></div>

<script>
const FIELD_POS=['P','C','1B','2B','3B','SS','LF','LC','CF','RF'];
const POS_PRI=['P','C','SS','3B','1B','2B','CF','LF','LC','RF'];

let roster=[
  {name:'Emory Moskowitz',age:9,rank:1,strengths:{C:2,SS:2,'2B':1,CF:1,LF:1,RF:1,LC:1}},
  {name:'Geneva Haungs',age:10,rank:2,strengths:{SS:2,'3B':2,P:1,'1B':1,C:1,LF:1,CF:1,RF:1,LC:1}},
  {name:'Sadie Swartz',age:9,rank:2,strengths:{P:2,'1B':2,'3B':1,'2B':1,LF:1,CF:1,RF:1,LC:1}},
  {name:'Shayna Levine',age:9,rank:4,strengths:{P:2,'3B':2,SS:1,'2B':1,LF:1,CF:1,RF:1,LC:1}},
  {name:'Mabel Davies',age:10,rank:5,strengths:{'3B':2,'1B':2,P:1,LF:1,CF:1,RF:1,LC:1}},
  {name:'Genevieve Meehl',age:9,rank:5,strengths:{P:2,'3B':1,'1B':1,LF:2,CF:1,RF:1,LC:1}},
  {name:'Quinn Scorzella',age:10,rank:6,strengths:{'2B':2,'3B':1,SS:1,LF:1,CF:1,RF:1,LC:1}},
  {name:'Mackenzie Mello',age:9,rank:7,strengths:{P:1,C:1,SS:1,'2B':1,'3B':1,'1B':1,LF:1,CF:1,RF:1,LC:1}},
  {name:'Hana Hafez',age:10,rank:8,strengths:{'1B':2,'2B':1,CF:2,LF:1,RF:1,LC:1}},
  {name:'Isabelle Roch',age:10,rank:8,strengths:{C:2,'1B':1,CF:1,LF:1,RF:2,LC:1}},
  {name:'Hayley Allia',age:10,rank:10,strengths:{'2B':2,LF:2,CF:1,RF:1,LC:1}},
];
let awardOverrides={},awardNotes={},awardBlurbs={},gameLog=[];
let battingOrder=[
  {idx:0,batPos:'C'},{idx:1,batPos:'SS'},{idx:2,batPos:'P'},
  {idx:3,batPos:'3B'},{idx:4,batPos:'1B'},{idx:5,batPos:'LF'},
  {idx:6,batPos:'2B'},{idx:7,batPos:'LC'},{idx:8,batPos:'CF'},
  {idx:9,batPos:'RF'},{idx:10,batPos:'LF'}
];
let defBlocks=[{benchIdx:10,assignments:{}},{benchIdx:8,assignments:{}},{benchIdx:9,assignments:{}}];
let fairPlayMode=false;
let steals=[false,false,false];
let lpTimer=null,lpActive=false,touchDragIdx=null,dragIdx=null;
let ghostEl=null,ghostOffsetY=0,saveTimer=null;
let dragRowH=72,rafPending=false,lastDestIdx=null,rowRects=[];

// PERSIST
const SK='haungs10b-v1';
function save(){try{localStorage.setItem(SK,JSON.stringify({roster,battingOrder,defBlocks,gameLog,awardOverrides,awardNotes,awardBlurbs,fairPlayMode}));}catch(e){}}
function load(){try{const r=localStorage.getItem(SK);if(!r)return;const s=JSON.parse(r);if(s.roster)roster=s.roster;if(s.battingOrder)battingOrder=s.battingOrder;if(s.defBlocks)defBlocks=s.defBlocks;if(s.gameLog)gameLog=s.gameLog;if(s.awardOverrides)awardOverrides=s.awardOverrides;if(s.awardNotes)awardNotes=s.awardNotes;if(s.awardBlurbs)awardBlurbs=s.awardBlurbs;if(typeof s.fairPlayMode==='boolean')fairPlayMode=s.fairPlayMode;}catch(e){}}

// THEME
function toggleTheme(){const h=document.documentElement;h.dataset.theme=h.dataset.theme==='light'?'dark':'light';try{localStorage.setItem('tv10b-theme',h.dataset.theme);}catch(e){}}
(function(){try{const s=localStorage.getItem('tv10b-theme');if(s)document.documentElement.dataset.theme=s;}catch(e){}})();

// TABS
function showTab(name,btn){
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

// HELPERS
const fn=i=>roster[i].name.split(' ')[0];
const fit=(pi,pos)=>roster[pi].strengths[pos]||0;
function showSaved(){const e=document.getElementById('saveInd');e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800);}

// STATS
function seasonTotals(){return gameLog.length?gameLog[gameLog.length-1].cumTotals:{};}
function gameDelta(i){
  const c=gameLog[i].cumTotals,p=i>0?gameLog[i-1].cumTotals:{};
  const d={};
  Object.keys(c).forEach(pi=>{
    const cv=c[pi],pv=p[pi]||{ab:0,h:0,bb:0,pa:0,s2:0,s3:0,hr:0,sb:0,gp:0};
    const ab=(cv.ab||0)-(pv.ab||0),h=(cv.h||0)-(pv.h||0),bb=(cv.bb||0)-(pv.bb||0),pa=(cv.pa||0)-(pv.pa||0);
    d[pi]={ab,h,bb,pa,s2:(cv.s2||0)-(pv.s2||0),s3:(cv.s3||0)-(pv.s3||0),hr:(cv.hr||0)-(pv.hr||0),sb:(cv.sb||0)-(pv.sb||0),gp:(cv.gp||0)-(pv.gp||0),avg:ab>0?h/ab:null,obp:pa>0?(h+bb)/pa:null};
  });
  return d;
}
function recentStats(n=3){
  const r={},s=Math.max(0,gameLog.length-n);
  for(let i=s;i<gameLog.length;i++){const d=gameDelta(i);Object.keys(d).forEach(pi=>{if(!r[pi])r[pi]={ab:0,h:0,bb:0,pa:0,s2:0,s3:0,hr:0,sb:0,gp:0};['ab','h','bb','pa','s2','s3','hr','sb','gp'].forEach(k=>r[pi][k]+=(d[pi][k]||0));});}
  Object.keys(r).forEach(pi=>{r[pi].avg=r[pi].ab>0?r[pi].h/r[pi].ab:null;r[pi].obp=r[pi].pa>0?(r[pi].h+r[pi].bb)/r[pi].pa:null;});
  return r;
}
function bestStretch(){
  if(!gameLog.length)return{};
  const best={};
  roster.forEach((_,ri)=>{
    const pg=gameLog.map((_,i)=>gameDelta(i)[ri]||{ab:0,h:0,bb:0,pa:0,sb:0,s2:0,s3:0,hr:0});
    let bA=-1,bD=null,bW='';
    const ws=Math.min(3,gameLog.length);
    for(let s=0;s<=gameLog.length-ws;s++){
      let ab=0,h=0,bb=0,pa=0,sb=0,s2=0,s3=0,hr=0;
      for(let j=s;j<s+ws;j++){ab+=pg[j].ab||0;h+=pg[j].h||0;bb+=pg[j].bb||0;pa+=pg[j].pa||0;sb+=pg[j].sb||0;s2+=pg[j].s2||0;s3+=pg[j].s3||0;hr+=pg[j].hr||0;}
      const avg=ab>0?h/ab:-1;
      if(avg>bA){bA=avg;bD={ab,h,bb,pa,sb,s2,s3,hr,avg,obp:pa>0?(h+bb)/pa:0};bW=`G${s+1}–G${s+ws}`;}
    }
    if(bD)best[ri]={...bD,window:bW};
  });
  return best;
}
function streakLabel(idx){
  const s=seasonTotals()[idx],r=recentStats(3)[idx];
  if(!s||!s.ab||s.ab<3||!r||!r.ab||r.ab<2)return null;
  const d=r.avg-s.avg;
  if(d>0.08)return{label:'🔥 Hot L3',cls:'hot'};
  if(d<-0.08)return{label:'❄️ Cold L3',cls:'cold'};
  return null;
}
function effRank(idx){const r=recentStats(3)[idx];if(!r||r.ab<2)return roster[idx].rank;const b=r.avg>0.4?-2:r.avg>0.3?-1:r.avg<0.15?2:0;return roster[idx].rank+b;}

// AUTO-SUGGEST
const IF_POS=new Set(['P','C','1B','2B','3B','SS']);
const OF_POS=new Set(['LF','LC','CF','RF']);

function buildSuggest(benchIdx,prev,pp,allBlocks){
  const pool=roster.map((_,i)=>i).filter(i=>i!==benchIdx);
  const assigned={},used=new Set();
  const prevMap={};if(prev)Object.entries(prev).forEach(([p,pi])=>prevMap[pi]=p);
  const ppMap={};if(pp)Object.entries(pp).forEach(([p,pi])=>ppMap[pi]=p);
  function sc(pi,pos){return(roster[pi].strengths[pos]||0)*10+(10-effRank(pi))+(prevMap[pi]===pos?-8:0)+(pp&&ppMap[pi]===pos?2:0);}

  if(fairPlayMode && allBlocks){
    // ── FAIR PLAY MODE: guarantee every player ≥2 innings IF and ≥2 innings OF ──
    // Count IF/OF innings already earned in prior blocks for each player
    const ifCount={},ofCount={};
    pool.forEach(pi=>{ifCount[pi]=0;ofCount[pi]=0;});
    (allBlocks||[]).forEach(b=>{
      if(!b||!b.assignments)return;
      Object.entries(b.assignments).forEach(([pos,pi])=>{
        if(IF_POS.has(pos))ifCount[pi]=(ifCount[pi]||0)+2;
        if(OF_POS.has(pos))ofCount[pi]=(ofCount[pi]||0)+2;
      });
    });

    // Determine which players NEED IF or OF this block to hit 2-inning minimums
    // This is the last block (bi=2, "allBlocks" contains prior two), so anyone at 0 needs it now
    const needsIF=pool.filter(pi=>ifCount[pi]===0);
    const needsOF=pool.filter(pi=>ofCount[pi]===0);

    // Reserve 1 IF spot per needsIF player, 1 OF spot per needsOF player
    // Build position pools
    const ifPositions=[...IF_POS].filter(p=>POS_PRI.includes(p));
    const ofPositions=[...OF_POS].filter(p=>POS_PRI.includes(p));

    // Assign mandated IF players first (sorted by fit)
    const reservedIF={},reservedOF={};
    const usedPos=new Set();

    // Sort needsIF by best IF fit descending
    const sortedNeedsIF=[...needsIF].sort((a,b)=>{
      const bA=Math.max(...ifPositions.map(p=>roster[a].strengths[p]||0));
      const bB=Math.max(...ifPositions.map(p=>roster[b].strengths[p]||0));
      return bB-bA;
    });
    sortedNeedsIF.forEach(pi=>{
      if(used.has(pi))return;
      const best=ifPositions.filter(p=>!usedPos.has(p)).sort((a,b)=>sc(pi,b)-sc(pi,a))[0];
      if(best){assigned[best]=pi;used.add(pi);usedPos.add(best);}
    });

    // Sort needsOF by best OF fit descending
    const sortedNeedsOF=[...needsOF].sort((a,b)=>{
      const bA=Math.max(...ofPositions.map(p=>roster[a].strengths[p]||0));
      const bB=Math.max(...ofPositions.map(p=>roster[b].strengths[p]||0));
      return bB-bA;
    });
    sortedNeedsOF.forEach(pi=>{
      if(used.has(pi))return;
      const best=ofPositions.filter(p=>!usedPos.has(p)).sort((a,b)=>sc(pi,b)-sc(pi,a))[0];
      if(best){assigned[best]=pi;used.add(pi);usedPos.add(best);}
    });

    // Fill remaining positions with normal scoring
    for(const pos of POS_PRI){
      if(assigned[pos]!==undefined)continue;
      const cands=pool.filter(i=>!used.has(i)).sort((a,b)=>sc(b,pos)-sc(a,pos));
      if(cands.length){assigned[pos]=cands[0];used.add(cands[0]);}
    }
  } else {
    // ── STANDARD MODE ──
    for(const pos of POS_PRI){const cands=pool.filter(i=>!used.has(i)).sort((a,b)=>sc(b,pos)-sc(a,pos));if(cands.length){assigned[pos]=cands[0];used.add(cands[0]);}}
  }

  if(prev){
    let changed=0;pool.forEach(pi=>{const np=Object.entries(assigned).find(([,v])=>v===pi)?.[0];if(prevMap[pi]!==np)changed++;});
    if(changed<=pool.length/2){
      const same=pool.filter(pi=>{const np=Object.entries(assigned).find(([,v])=>v===pi)?.[0];return prevMap[pi]===np;});
      for(let i=0;i<same.length-1&&changed<=pool.length/2;i++){
        const a=same[i],b=same[i+1];
        const pa=Object.entries(assigned).find(([,v])=>v===a)?.[0];
        const pb=Object.entries(assigned).find(([,v])=>v===b)?.[0];
        if(pa&&pb&&pa!==pb&&(roster[a].strengths[pb]||0)>0&&(roster[b].strengths[pa]||0)>0){assigned[pa]=b;assigned[pb]=a;changed+=2;}
      }
    }
  }
  return assigned;
}

function autoSuggest(bi){
  const prev=bi>0?defBlocks[bi-1].assignments:null;
  const pp=bi>1?defBlocks[bi-2].assignments:null;
  // Pass prior completed blocks so Fair Play can count what players have already earned
  const priorBlocks=bi>0?defBlocks.slice(0,bi).map(b=>b.assignments?{assignments:b.assignments}:null):null;
  defBlocks[bi].assignments=buildSuggest(defBlocks[bi].benchIdx,prev,pp,priorBlocks);

// Run all three suggest blocks in sequence so each block sees the prior ones
function autoSuggestAll(){
  for(let bi=0;bi<3;bi++){
    const prev=bi>0?defBlocks[bi-1].assignments:null;
    const pp=bi>1?defBlocks[bi-2].assignments:null;
    const priorBlocks=bi>0?defBlocks.slice(0,bi).map(b=>({assignments:{...b.assignments}})):null;
    defBlocks[bi].assignments=buildSuggest(defBlocks[bi].benchIdx,prev,pp,priorBlocks);
  }
}

// Compliance check: per player, count IF and OF innings across all 3 blocks
function getFairPlayCompliance(){
  const result={};
  roster.forEach((_,pi)=>{result[pi]={if:0,of:0};});
  defBlocks.forEach(block=>{
    Object.entries(block.assignments).forEach(([pos,pi])=>{
      if(IF_POS.has(pos))result[pi].if+=2;
      if(OF_POS.has(pos))result[pi].of+=2;
    });
  });

}

function manualDefAssign(bi,pos,newPi){
  const block=defBlocks[bi],oldPi=block.assignments[pos];
  const newCur=Object.entries(block.assignments).find(([p,v])=>v===newPi&&p!==pos)?.[0];
  if(newCur!==undefined){if(oldPi!==undefined){block.assignments[newCur]=oldPi;syncBatPos(oldPi,newCur);}else delete block.assignments[newCur];}
  Object.keys(block.assignments).forEach(p=>{if(p!==pos&&block.assignments[p]===newPi)delete block.assignments[p];});
  block.assignments[pos]=newPi;syncBatPos(newPi,pos);

}

/** Haptic: short pulse on activate, tick on drop */
function haptic(type) {
  if (!navigator.vibrate) return;
  if (type === 'activate') navigator.vibrate([15, 10, 15]);
  else if (type === 'drop')   navigator.vibrate(8);
  else if (type === 'tick')   navigator.vibrate(4);
}

/** Create floating ghost clone of the dragged row */
function createGhost(row, touchY) {
  removeGhost();
  // Snapshot ALL row positions before any transforms are applied.
  // getDropTarget uses this frozen geometry — immune to CSS transform jitter.
  rowRects = [];
  document.querySelectorAll('#sc-batting .brow:not(.drag-ghost)').forEach(r => {
    const rect = r.getBoundingClientRect();
    rowRects.push({ idx: +r.dataset.i, top: rect.top, bottom: rect.bottom, el: r });
  });

  const rect = row.getBoundingClientRect();
  ghostOffsetY = touchY - rect.top;
  dragRowH = rect.height;
  document.querySelectorAll('#sc-batting .brow').forEach(r =>
    r.style.setProperty('--row-h', dragRowH + 'px')
  );
  lastDestIdx = null;
  rafPending = false;
  ghostEl = row.cloneNode(true);
  ghostEl.className = 'brow drag-ghost';
  ghostEl.style.width = rect.width + 'px';
  ghostEl.style.top = (touchY - ghostOffsetY) + 'px';
  ghostEl.style.left = rect.left + 'px';
  document.body.appendChild(ghostEl);
}

function moveGhost(touchY) {
  if (!ghostEl) return;
  ghostEl.style.top = (touchY - ghostOffsetY) + 'px';
}

function removeGhost() {
  if (ghostEl) { ghostEl.remove(); ghostEl = null; }
  rowRects = [];
}

/** Hit-test against frozen rect snapshot — no live layout reads during drag */
function getDropTarget(touchX, touchY, sourceRow) {
  for (const r of rowRects) {
    if (r.el === sourceRow) continue;
    if (touchY >= r.top && touchY <= r.bottom) return r.idx;
  }
  return null;
}

/** Shift rows visually — only called when destIdx actually changes */
function applyShifts(srcIdx, destIdx) {
  const rows = [...document.querySelectorAll('#sc-batting .brow:not(.drag-ghost)')];
  rows.forEach(r => {
    r.classList.remove('shift-down', 'shift-up');
    if (r.classList.contains('dragging')) return;
    const ri = +r.dataset.i;
    if (srcIdx < destIdx) {
      if (ri > srcIdx && ri <= destIdx) r.classList.add('shift-up');
    } else {
      if (ri >= destIdx && ri < srcIdx) r.classList.add('shift-down');
    }
  });
}

function removeHighlights() {
  document.querySelectorAll('.brow').forEach(r => {
    r.classList.remove('drag-over','drop-above','drop-below','shift-down','shift-up');
  });
}

        lpActive = true;
        touchDragIdx = i;
        haptic('activate');

    handle.addEventListener('touchmove', e => {
      if (!lpActive) { clearTimeout(lpTimer); return; }
      e.preventDefault();
      const t = e.touches[0];
      const touchY = t.clientY;

      // rAF-lock: ghost position update — smooth, no layout thrash
      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(() => {
          if (ghostEl) ghostEl.style.top = (touchY - ghostOffsetY) + 'px';
          rafPending = false;
        });
      }

      // Only recompute shifts when finger crosses into a new row
      const target = getDropTarget(t.clientX, touchY, row);
      if (target !== null && target !== lastDestIdx) {
        lastDestIdx = target;
        haptic('tick');

      } else if (target === null && lastDestIdx !== null) {

    handle.addEventListener('touchend', e => {
      clearTimeout(lpTimer);

      const t = e.changedTouches[0];

      removeHighlights();

        dragIdx = null;
        touchDragIdx = src;
        doDrop(target);
      }

      lpActive = false;
    });

    handle.addEventListener('touchcancel', () => {
      clearTimeout(lpTimer);
      removeGhost();
      removeHighlights();
      document.querySelectorAll('.brow').forEach(x => x.classList.remove('dragging'));
      lastDestIdx = null;
      rafPending = false;
      touchDragIdx = null;
      lpActive = false;

  });

  printBtn.textContent = '📄 EXPORT LINEUP AS PDF';

function handleCSV(input){if(input.files[0])parseCSV(input.files[0]);}
function parseCSV(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.trim().split('\n').map(l=>l.trim()).filter(l=>l);
    if(lines.length<2){alert('CSV appears empty.');return;}
    const header=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/['"]/g,''));
    const col=n=>header.indexOf(n);
    const iL=col('last'),iF=col('first'),iGP=col('gp'),iPA=col('pa'),iAB=col('ab'),iH=col('h'),i2=col('2b'),i3=col('3b'),iHR=col('hr'),iBB=col('bb'),iSB=col('sb'),iAVG=col('avg'),iOBP=col('obp');
    if(iL===-1&&iF===-1){alert('Cannot read player names. Use GameChanger batting CSV.');return;}
    const cum={};let matched=0;
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',').map(c=>c.trim().replace(/['"]/g,''));if(cols.length<3)continue;
      const last=(iL>=0?cols[iL]:'').toLowerCase(),first=(iF>=0?cols[iF]:'').toLowerCase();
      let bIdx=-1,bSc=0;
      roster.forEach((p,ri)=>{const rf=p.name.split(' ')[0].toLowerCase(),rl=p.name.split(' ').slice(1).join(' ').toLowerCase();let sc=0;if(first&&rf===first)sc+=4;else if(first&&rf.startsWith(first.slice(0,3)))sc+=2;if(last&&rl===last)sc+=4;else if(last&&rl.startsWith(last.slice(0,3)))sc+=1;if(sc>bSc){bSc=sc;bIdx=ri;}});
      if(bIdx>=0&&bSc>=2){const gv=n=>n>=0&&cols[n]?parseFloat(cols[n])||0:0;const ab=gv(iAB),h=gv(iH),bb=gv(iBB),pa=gv(iPA)||ab+bb;cum[bIdx]={gp:gv(iGP),pa,ab,h,bb,s2:gv(i2),s3:gv(i3),hr:gv(iHR),sb:gv(iSB),avg:iAVG>=0&&cols[iAVG]?parseFloat(cols[iAVG])||0:(ab>0?h/ab:0),obp:iOBP>=0&&cols[iOBP]?parseFloat(cols[iOBP])||0:(pa>0?(h+bb)/pa:0)};matched++;}
    }
    if(!matched){alert('No players matched. Check this is a GameChanger batting CSV.');return;}
    const label=prompt('Name this game (e.g. "vs Phoenixville")',`Game ${gameLog.length+1}`)||`Game ${gameLog.length+1}`;
    gameLog.push({label,cumTotals:cum});save();renderAll();showSaved();
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.getElementById('tab-stats').classList.add('active');document.querySelectorAll('.tab-btn')[3].classList.add('active');
  };reader.readAsText(file);
}
function delGame(i){if(!confirm(`Remove ${gameLog[i].label}?`))return;gameLog.splice(i,1);save();renderAll();}

function genBlurb(award,wi,note){
  const first=fn(wi),s=seasonTotals()[wi];
  let stat='',extra='';
  if(s&&s.ab>0){
    stat=`This season, <strong>${first}</strong> batted <span class="sh">${s.avg.toFixed(3)}</span> with an OBP of <span class="sh">${s.obp.toFixed(3)}</span>, recording ${s.h} hit${s.h!==1?'s':''} in ${s.ab} at-bats across ${s.gp} game${s.gp!==1?'s':''}.`;
    const xbh=(s.s2||0)+(s.s3||0)+(s.hr||0);
    if(s.sb>0)stat+=` She swiped <span class="sh">${s.sb}</span> base${s.sb!==1?'s':''}, a constant threat on the basepaths.`;
    if(xbh>0)stat+=` Her ${xbh} extra-base hit${xbh!==1?'s':''} demonstrated real power at the plate.`;
    if(streakLabel(wi)?.cls==='hot')stat+=` She finished the season on a tear, posting her best numbers in the final stretch.`;
  }else{stat=`<strong>${first}</strong> brought energy and effort every single game.`;}
  if(note&&note.trim())extra=` ${note.trim().replace(/\.$/,'')} — the kind of impact that doesn't show up in any stat line.`;
  return stat+extra;
}

      .sort((a, b) => a.first.localeCompare(b.first));

    const rows = players.map(({first, last, pos}, idx) => `
      <tr style="background:${idx%2===0?'#fff':'#fafafa'};">
        <td style="padding:8px 10px;font-size:13pt;font-weight:800;color:#111;border-bottom:1px solid #eee;">
          ${first} <span style="font-size:9pt;font-weight:600;color:#666;">${last}</span>
        </td>
        <td style="padding:8px 10px;font-size:16pt;font-weight:900;color:#C22818;text-align:right;border-bottom:1px solid #eee;white-space:nowrap;">
          ${pos}
        </td>
      </tr>`).join('');

    return `<td style="vertical-align:top;padding:0 8px;width:33.3%;">
      <table style="width:100%;border-collapse:collapse;border:2px solid #ddd;border-radius:6px;overflow:hidden;">
        <tr>
          <td colspan="2" style="background:#C22818;color:#fff;font-size:13pt;font-weight:900;letter-spacing:2px;padding:9px 12px;text-align:center;">
            ${label}
          </td>
        </tr>
        <tr>
          <td colspan="2" style="background:#fff3f3;color:#C22818;font-size:9pt;font-weight:700;letter-spacing:1px;padding:5px 12px;border-bottom:1px solid #fcc;">
            ⬛ BENCH: ${bench}
          </td>
        </tr>
        ${rows}
      </table>
    </td>`;
  }).join('');

  card.innerHTML = `
    <div style="font-family:'Barlow Condensed',Arial Narrow,sans-serif;color:#000;background:#fff;">
      <table style="width:100%;border-collapse:collapse;border-bottom:4px solid #C22818;margin-bottom:14px;">
        <tr>
          <td style="padding-bottom:8px;">
            <div style="font-size:20pt;font-weight:900;color:#C22818;letter-spacing:1px;line-height:1;">⚾ TEAM HAUNGS — DEFENSIVE ROTATION</div>
            <div style="font-size:9pt;letter-spacing:3px;color:#555;margin-top:3px;">TVL MINORS 10B · FIND YOUR NAME → FIND YOUR POSITION</div>
          </td>
          <td style="text-align:right;padding-bottom:8px;white-space:nowrap;">
            <div style="font-size:12pt;font-weight:700;">${today}</div>
            <div style="font-size:9pt;color:#555;">vs. _______________</div>
          </td>
        </tr>
      </table>
      <table style="width:100%;border-collapse:collapse;">
        <tr>${colsHTML}</tr>
      </table>
      <table style="width:100%;border-collapse:collapse;margin-top:12px;border-top:1px solid #ddd;">
        <tr>
          <td style="padding-top:5px;font-size:7pt;color:#aaa;letter-spacing:1px;">TEAM HAUNGS · TVL MINORS 10B</td>
          <td style="padding-top:5px;font-size:7pt;color:#aaa;text-align:center;">Post in dugout — players check position each inning change</td>
          <td style="padding-top:5px;font-size:7pt;color:#aaa;text-align:right;">${today}</td>
        </tr>
      </table>
    </div>`;

  window.print();
}

/** Inject a <style> tag to control @page size for the upcoming print */
function _setPrintPage(orientation) {
  const existing = document.getElementById('_print_page_style');
  if (existing) existing.remove();
  const s = document.createElement('style');
  s.id = '_print_page_style';
  s.textContent = `@media print { @page { size: letter ${orientation}; margin: 0.4in; } }`;
  document.head.appendChild(s);
}

// STEALS
function toggleSteal(n){steals[n-1]=!steals[n-1];save();updateSteals();}
function resetSteals(){steals=[false,false,false];save();updateSteals();}
function updateSteals(){steals.forEach((s,i)=>{const e=document.getElementById('sd'+(i+1));if(e)e.classList.toggle('used',s);});const ct=document.getElementById('scnt');if(ct)ct.textContent=steals.filter(Boolean).length+' of 3 used';}

// OFFLINE
function updateOnline(){const b=document.getElementById('offlineBar');if(b)b.classList.toggle('show',!navigator.onLine);}
window.addEventListener('online',updateOnline);window.addEventListener('offline',updateOnline);

// SERVICE WORKER — non-blocking, safe
window.addEventListener('load',()=>{
  if(!('serviceWorker' in navigator))return;
  try{const sw=`const C='h10b-v5';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./','./index.html']).catch(()=>{})));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(!e.request.url.startsWith('http'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{if(resp&&resp.status===200){const cl=resp.clone();caches.open(C).then(c=>c.put(e.request,cl));}return resp;}).catch(()=>new Response('Offline',{status:503}))));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'})),{scope:'./'}).catch(()=>{});}catch(e){}
});

// INIT
function renderAll(){renderBatting();renderDefense();renderSettings();renderStats();renderAwards();}
load();
defBlocks.forEach((b,bi)=>{if(!Object.keys(b.assignments).length)autoSuggest(bi);});
renderAll();
updateOnline();
</script>
