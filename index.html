async function parseImage(file){
  const isImg=file.type.startsWith('image/'),isPdf=file.type==='application/pdf';
  if(!isImg&&!isPdf){alert('Please upload an image or PDF file.');return;}
  if(file.size>10*1024*1024){alert('File too large (10MB max). Please take a smaller photo.');return;}

  let base64,mediaType='image/png';

  try{
    if(isPdf){
      setImgStatus('Converting PDF to image...','var(--teal)');
      const pdfImg=await pdfToPng(file);
      if(!pdfImg){setImgStatus('Could not read PDF. Try taking a screenshot instead.','var(--bad)');return;}
      base64=pdfImg;
    }else{
      setImgStatus('Preparing image...','var(--teal)');
      // Re-encode image to PNG to normalize and shrink if huge
      const prepped=await prepImageFile(file);
      base64=prepped.base64;
      mediaType=prepped.mediaType;
    }
  }catch(err){
    console.error('File prep error:',err);
    setImgStatus('Could not prepare file: '+(err.message||'unknown error'),'var(--bad)');
    return;
  }

  setImgStatus('Reading box score... (may take 10-20 sec)','var(--teal)');

  // Build our-team roster hint so vision model can match names
  const ourRoster=roster.map(p=>p.name).join(', ');

  const prompt=`You are parsing a youth softball box score. Extract ONLY the batting stats for OUR team's players. Our team roster is: ${ourRoster}.

The box score may show two teams. Identify which side is ours by matching names from the roster above. IGNORE the opposing team's stats entirely.

For each of OUR players who appear on the box score, return their SINGLE-GAME stats from this one game (not season totals).

Respond with ONLY valid JSON in this exact shape, no markdown, no code fences, no explanation:
{
  "team_name": "string (our team name as shown, or empty)",
  "opponent": "string (opposing team name, or empty)",
  "result": "string like 'W 9-5' or 'L 3-7', or empty",
  "players": [
    {"name": "string as shown on box score", "ab": 0, "r": 0, "h": 0, "rbi": 0, "bb": 0, "so": 0, "doubles": 0, "triples": 0, "hr": 0, "sb": 0}
  ]
}

Rules:
- Use 0 for any stat not visible.
- "doubles" = 2B, "triples" = 3B (these often appear in a totals line like "2B: Jane, John").
- "sb" = stolen bases (often in a totals line like "SB: Jane 2, John").
- If a player has a (P) or (C) or position tag next to their name, strip it from the name field.
- Only include OUR players. Do not include the opponent.
- Return ONLY the JSON object, nothing else.`;

  let apiData;
  const customUrl=(localStorage.getItem('tv10b-api-url')||'').trim();
  const apiUrl=customUrl||'https://api.anthropic.com/v1/messages';
  try{
    const content=[
      {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
      {type:'text',text:prompt}
    ];
    const resp=await fetch(apiUrl,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,messages:[{role:'user',content}]})
    });
    if(!resp.ok){
      let detail='';try{const t=await resp.text();detail=': '+t.slice(0,300);}catch(e){}
      throw new Error('Server returned '+resp.status+detail);
    }
    apiData=await resp.json();
  }catch(err){
    console.error('API error:',err);
    const msg=err.message||String(err);
    // Show the raw error so we can diagnose — don't hide behind "Network error"
    const friendly=msg.includes('Failed to fetch')||msg.includes('Load failed')?
      `Cannot reach API (${customUrl?'Worker':'Claude.ai'}). Likely causes: Worker not deployed, CORS origin mismatch, or TLS issue. Check browser console.`:
      msg;
    setImgStatus('Error: '+friendly,'var(--bad)');
    return;
  }

  // Extract text from response
  const textOut=(apiData.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
  if(!textOut){setImgStatus('No data returned from box score.','var(--bad)');return;}

  // Strip code fences if model added them
  const cleaned=textOut.replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  let parsed;
  try{parsed=JSON.parse(cleaned);}
  catch(err){setImgStatus('Could not understand box score format. Try a clearer image.','var(--bad)');console.error('Parse fail:',cleaned);return;}

  const players=Array.isArray(parsed.players)?parsed.players:[];
  if(!players.length){setImgStatus('No player stats found in image.','var(--bad)');return;}

  setImgStatus(`Matched ${players.length} players. Review before saving.`,'var(--good)');

  // Fuzzy-match box score names → roster indexes (reuse same scoring approach as CSV)
  const scoreName=(rosterName,bsName)=>{
    const rp=rosterName.toLowerCase().trim().split(/\s+/);
    const rf=rp[0]||'',rl=rp.slice(1).join(' ');
    const bp=bsName.toLowerCase().trim().replace(/\([^)]*\)/g,'').trim().split(/\s+/);
    const bf=bp[0]||'',bl=bp.slice(1).join(' ');
    let sc=0;
    if(bf&&rf===bf)sc+=4;else if(bf&&rf.startsWith(bf.slice(0,3)))sc+=2;else if(bf&&bf.length===1&&rf.startsWith(bf))sc+=2;
    if(bl&&rl===bl)sc+=4;else if(bl&&rl.startsWith(bl.slice(0,3)))sc+=1;
    // Also handle "Maddie P" where P is last-name initial
    if(bl&&bl.length<=2&&rl&&rl.startsWith(bl.charAt(0)))sc+=1;
    return sc;
  };

  // Build csvRows-compatible shape so we can reuse the existing preview modal
  const csvRows=players.map((pl,idx)=>({
    rowIdx:idx,
    first:pl.name.split(' ')[0]||'',
    last:pl.name.split(' ').slice(1).join(' ')||'',
    display:pl.name,
    _game:pl  // attach raw single-game stats
  }));

  const matches=roster.map((p,ri)=>{
    let bestSc=-1,bestRow=null;
    csvRows.forEach(r=>{const sc=scoreName(p.name,r.display);if(sc>bestSc){bestSc=sc;bestRow=r;}});
    let quality='none';
    if(bestSc>=6)quality='perfect';
    else if(bestSc>=3)quality='fuzzy';
    else{bestRow=null;quality='none';}
    return{rosterIdx:ri,csvRowIdx:bestRow?bestRow.rowIdx:null,quality};
  });

  // Prevent duplicate matches
  const used={};
  matches.forEach(m=>{if(m.csvRowIdx===null)return;if(used[m.csvRowIdx]===undefined)used[m.csvRowIdx]=m.rosterIdx;else{m.csvRowIdx=null;m.quality='none';}});

  // Stash as pendingCsv but flagged as image source so confirm can add deltas to prior cum totals
  pendingCsv={
    source:'image',
    csvRows,matches,
    boxMeta:{opponent:parsed.opponent||'',result:parsed.result||'',team:parsed.team_name||''}
  };
  setImgStatus('',null);
  showCsvPreview();
}

function parseCSV(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.trim().split('\n').map(l=>l.trim()).filter(l=>l);
    if(lines.length<2){alert('CSV appears empty.');return;}
    const header=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/['"]/g,''));
    const col=n=>header.indexOf(n);
    const iL=col('last'),iF=col('first'),iGP=col('gp'),iPA=col('pa'),iAB=col('ab'),iH=col('h'),i2=col('2b'),i3=col('3b'),iHR=col('hr'),iBB=col('bb'),iSB=col('sb'),iAVG=col('avg'),iOBP=col('obp');
    if(iL===-1&&iF===-1){alert('Cannot read player names. Use GameChanger batting CSV.');return;}

    // Parse every data row
    const csvRows=[];
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',').map(c=>c.trim().replace(/['"]/g,''));
      if(cols.length<3)continue;
      const last=(iL>=0?cols[iL]:'').toLowerCase();
      const first=(iF>=0?cols[iF]:'').toLowerCase();
      if(!first&&!last)continue;
      csvRows.push({rowIdx:i,first,last,cols,display:`${cols[iF]||''} ${cols[iL]||''}`.trim()});
    }
    if(!csvRows.length){alert('No data rows found in CSV.');return;}

    // Score each roster player against each CSV row
    const matches=roster.map((p,ri)=>{
      const rf=p.name.split(' ')[0].toLowerCase();
      const rl=p.name.split(' ').slice(1).join(' ').toLowerCase();
      let bestSc=-1,bestRow=null;
      csvRows.forEach(r=>{
        let sc=0;
        if(r.first&&rf===r.first)sc+=4;else if(r.first&&rf.startsWith(r.first.slice(0,3)))sc+=2;
        if(r.last&&rl===r.last)sc+=4;else if(r.last&&rl.startsWith(r.last.slice(0,3)))sc+=1;
        if(sc>bestSc){bestSc=sc;bestRow=r;}
      });
      let quality='none';
      if(bestSc>=8)quality='perfect';
      else if(bestSc>=4)quality='fuzzy';
      else{bestRow=null;quality='none';}
      return{rosterIdx:ri,csvRowIdx:bestRow?bestRow.rowIdx:null,quality};
    });

    // Prevent duplicate matches (same CSV row used twice)
    const usedCsvRows={};
    matches.forEach(m=>{
      if(m.csvRowIdx===null)return;
      if(usedCsvRows[m.csvRowIdx]===undefined){usedCsvRows[m.csvRowIdx]=m.rosterIdx;}
      else{m.csvRowIdx=null;m.quality='none';}
    });

    pendingCsv={header,csvRows,matches,iL,iF,iGP,iPA,iAB,iH,i2,i3,iHR,iBB,iSB,iAVG,iOBP};
    showCsvPreview();
  };
  reader.readAsText(file);
}

function showCsvPreview(){
  const modal=document.getElementById('csvModal');
  const body=document.getElementById('csvModalBody');
  const sub=document.getElementById('csvModalSub');
  const title=document.getElementById('csvModalTitle');
  const perfect=pendingCsv.matches.filter(m=>m.quality==='perfect').length;
  const fuzzy=pendingCsv.matches.filter(m=>m.quality==='fuzzy').length;
  const manual=pendingCsv.matches.filter(m=>m.quality==='manual').length;
  const none=pendingCsv.matches.filter(m=>m.quality==='none').length;
  const isImg=pendingCsv.source==='image';
  if(title)title.textContent=isImg?'Review Box Score Import':'Review Player Matches';
  const srcNote=isImg?`<em>Single-game stats from box score will be added to your season totals.</em><br>`:'';
  sub.innerHTML=`${srcNote}<strong style="color:var(--good)">${perfect} perfect</strong> · <strong style="color:var(--warn)">${fuzzy} fuzzy</strong>${manual?' · <strong style="color:var(--teal)">'+manual+' manual</strong>':''} · <strong style="color:var(--bad)">${none} unmatched</strong>. Review before saving.`;

  body.innerHTML='';
  pendingCsv.matches.forEach((m,idx)=>{
    const p=roster[m.rosterIdx];
    const row=document.createElement('div');
    row.className='match-row'+(m.quality==='none'?' unmatched':(m.quality==='perfect'?' perfect':''));
    const qBadge=m.quality==='perfect'?'<span class="match-quality mq-perfect">✓</span>':m.quality==='fuzzy'?'<span class="match-quality mq-fuzzy">FUZZY</span>':m.quality==='manual'?'<span class="match-quality mq-manual">MANUAL</span>':'<span class="match-quality mq-none">NO MATCH</span>';
    const selOpts=pendingCsv.csvRows.map(r=>`<option value="${r.rowIdx}" ${m.csvRowIdx===r.rowIdx?'selected':''}>${(r.display||'(row '+r.rowIdx+')').replace(/</g,'&lt;')}</option>`).join('');
    const selHtml=`<select class="match-csv ${m.quality==='none'?'unmatched':''}" onchange="updateCsvMatch(${idx},this.value)">
      <option value="">— Skip this player —</option>
      ${selOpts}
    </select>`;
    row.innerHTML=`<div><div class="match-roster">${p.name}${qBadge}</div><div class="match-roster-sub">Manual #${p.rank}</div></div><div class="match-arrow">→</div><div>${selHtml}</div>`;
    body.appendChild(row);
  });

  modal.classList.add('show');
}

function updateCsvMatch(idx,val){
  if(!pendingCsv)return;
  const newRowIdx=val===''?null:parseInt(val,10);
  if(newRowIdx!==null){
    // Any other match using this row gets cleared
    pendingCsv.matches.forEach((m,i)=>{if(i!==idx&&m.csvRowIdx===newRowIdx){m.csvRowIdx=null;m.quality='none';}});
  }
  pendingCsv.matches[idx].csvRowIdx=newRowIdx;
  pendingCsv.matches[idx].quality=newRowIdx===null?'none':'manual';
  showCsvPreview();
}

function cancelCsvImport(){
  pendingCsv=null;
  document.getElementById('csvModal').classList.remove('show');
}

function confirmCsvImport(){
  if(!pendingCsv)return;
  const isImg=pendingCsv.source==='image';
  const cum={};let matched=0;

  if(isImg){
    // Image → single-game stats. Add to previous active game's cumulative totals.
    const act=activeGameIdxs();
    const prev=act.length?gameLog[act[act.length-1]].cumTotals:{};
    pendingCsv.matches.forEach(m=>{
      if(m.csvRowIdx===null)return;
      const r=pendingCsv.csvRows.find(cr=>cr.rowIdx===m.csvRowIdx);
      if(!r||!r._game)return;
      const g=r._game;
      const pv=prev[m.rosterIdx]||{gp:0,pa:0,ab:0,h:0,bb:0,s2:0,s3:0,hr:0,sb:0};
      const ab=+g.ab||0,h=+g.h||0,bb=+g.bb||0,s2=+g.doubles||0,s3=+g.triples||0,hr=+g.hr||0,sb=+g.sb||0;
      const pa=ab+bb;  // box scores rarely have explicit PA; derive it
      const cGP=(pv.gp||0)+1;
      const cPA=(pv.pa||0)+pa;
      const cAB=(pv.ab||0)+ab;
      const cH=(pv.h||0)+h;
      const cBB=(pv.bb||0)+bb;
      cum[m.rosterIdx]={
        gp:cGP,pa:cPA,ab:cAB,h:cH,bb:cBB,
        s2:(pv.s2||0)+s2,s3:(pv.s3||0)+s3,hr:(pv.hr||0)+hr,sb:(pv.sb||0)+sb,
        avg:cAB>0?cH/cAB:0,
        obp:cPA>0?(cH+cBB)/cPA:0
      };
      matched++;
    });
    // Also carry forward players who didn't appear in this box score (didn't play or DNP)
    Object.keys(prev).forEach(k=>{if(cum[k]===undefined)cum[k]=prev[k];});
  }else{
    // CSV → already cumulative season totals
    const {matches,csvRows,iGP,iPA,iAB,iH,i2,i3,iHR,iBB,iSB,iAVG,iOBP}=pendingCsv;
    matches.forEach(m=>{
      if(m.csvRowIdx===null)return;
      const r=csvRows.find(cr=>cr.rowIdx===m.csvRowIdx);
      if(!r)return;
      const cols=r.cols;
      const gv=n=>n>=0&&cols[n]?parseFloat(cols[n])||0:0;
      const ab=gv(iAB),h=gv(iH),bb=gv(iBB),pa=gv(iPA)||ab+bb;
      cum[m.rosterIdx]={
        gp:gv(iGP),pa,ab,h,bb,
        s2:gv(i2),s3:gv(i3),hr:gv(iHR),sb:gv(iSB),
        avg:iAVG>=0&&cols[iAVG]?parseFloat(cols[iAVG])||0:(ab>0?h/ab:0),
        obp:iOBP>=0&&cols[iOBP]?parseFloat(cols[iOBP])||0:(pa>0?(h+bb)/pa:0)
      };
      matched++;
    });
  }
  if(!matched){alert('No matches confirmed — nothing to import.');return;}

  document.getElementById('csvModal').classList.remove('show');
  const suggested=isImg&&pendingCsv.boxMeta&&pendingCsv.boxMeta.opponent?`vs ${pendingCsv.boxMeta.opponent}`:`Game ${gameLog.length+1}`;
  pendingCsv=null;

  const label=prompt('Name this game (e.g. "vs Phoenixville")',suggested)||`Game ${gameLog.length+1}`;
  const source=isImg?'image':'csv';
  const newGame={label,cumTotals:cum,source,addedAt:Date.now()};

  // CSV override: mark all prior image-sourced games as superseded (CSV is the source of truth)
  let supersededCount=0;
  if(source==='csv'){
    gameLog.forEach(g=>{if(g.source==='image'&&!g.superseded){g.superseded=true;g.supersededBy=newGame.addedAt;supersededCount++;}});
  }

  gameLog.push(newGame);save();renderAll();showSaved();
  if(supersededCount>0){setTimeout(()=>alert(`✓ CSV imported. ${supersededCount} prior box-score entr${supersededCount===1?'y':'ies'} marked as superseded (kept in log but excluded from season stats).`),150);}

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-stats').classList.add('active');
  const statsBtn=[...document.querySelectorAll('.tab-btn')].find(b=>b.textContent.includes('STATS'));
  if(statsBtn)statsBtn.classList.add('active');
}

// Build stat fragments woven into variants
function _statFacts(wi){
  const first=fn(wi),s=seasonTotals()[wi];
  if(!s||!s.ab)return{first,has:false};
  const xbh=(s.s2||0)+(s.s3||0)+(s.hr||0);
  return{
    first,has:true,
    avg:s.avg.toFixed(3),obp:s.obp.toFixed(3),
    h:s.h,ab:s.ab,gp:s.gp,sb:s.sb||0,xbh,hr:s.hr||0,bb:s.bb||0,
    hot:streakLabel(wi)?.cls==='hot'
  };
}

function _catKey(award){
  const c=award.cat;
  if(c==='cat-stat')return 'stat';
  if(c==='cat-def')return 'def';
  if(c==='cat-spirit')return 'spirit';
  if(c==='cat-growth')return 'growth';
  if(c==='cat-team')return 'team';
  if(c==='cat-fun')return 'fun';
  return 'stat';
}

// Generate blurb. variant cycles 0/1/2 for reroll.
function genBlurb(award,wi,note,variant){
  const f=_statFacts(wi);
  const key=_catKey(award);
  const bank=BLURB_VARIANTS[key]||BLURB_VARIANTS.stat;
  const v=((variant||0)%bank.length+bank.length)%bank.length;
  const cleanNote=(note||'').trim().replace(/\.$/,'');
  return bank[v](f,cleanNote?cleanNote+'.':'');
}

function rerollBlurb(awardId,winnerIdx){
  const award=AWARDS.find(a=>a.id===awardId);if(!award)return;
  const bank=BLURB_VARIANTS[_catKey(award)]||BLURB_VARIANTS.stat;
  const cur=awardBlurbVariants[awardId]||0;
  const next=(cur+1)%bank.length;
  awardBlurbVariants[awardId]=next;
  awardBlurbs[awardId]=genBlurb(award,winnerIdx,awardNotes[awardId]||'',next);
  save();renderAwards();
}

function renderAwards(){
  const sc=document.getElementById('sc-awards');sc.innerHTML='';
  const hasStats=gameLog.length>0;

  const intro=document.createElement('div');intro.className='award-intro';intro.innerHTML=`<strong>Stat awards</strong> auto-nominate top 3 from GameChanger data. <strong>Character awards</strong> are coach-nominated. Add a note, hit <strong>Generate</strong>, and <strong>Reroll</strong> to cycle through variations.`;sc.appendChild(intro);
  AWARDS.forEach(award=>{
    const nominees=award.auto(),override=awardOverrides[award.id],winnerIdx=override!==undefined?+override:(nominees.length>0?nominees[0].idx:null);

    card.innerHTML=`<div class="acard-hdr"><div class="aemoji">${award.emoji}</div><div style="flex:1"><div class="aname">${award.name}</div><div class="adesc">${award.desc}</div></div><span class="acat ${award.cat}">${award.catL}</span></div>`;
    const body=document.createElement('div');body.className='acard-body';
    const nomDiv=document.createElement('div');nomDiv.className='nominees';
    if(nominees.length){nominees.forEach((n,rank)=>{const isWin=override===undefined?rank===0:+override===n.idx;const row=document.createElement('div');row.className='nom-row'+(isWin?' winner':'');row.innerHTML=`<div class="nom-medal">${MEDALS[rank]||'·'}</div><div style="flex:1"><div class="nom-name">${fn(n.idx)}</div><div class="nom-why">${n.reason}</div></div><div class="nom-val">${n.val}</div>`;nomDiv.appendChild(row);});}
    else if(override!==undefined){const row=document.createElement('div');row.className='nom-row winner';row.innerHTML=`<div class="nom-medal">🥇</div><div style="flex:1"><div class="nom-name">${fn(+override)}</div><div class="nom-why">Coach's pick</div></div><div class="nom-val">✓</div>`;nomDiv.appendChild(row);}
    else{const empty=document.createElement('div');empty.className='ano-data';empty.textContent=hasStats?'Use the dropdown below to nominate':'Upload stats to auto-nominate · or use dropdown';nomDiv.appendChild(empty);}
    body.appendChild(nomDiv);
    if(awardBlurbs[award.id]){const bd=document.createElement('div');bd.className='ablurb';bd.innerHTML=awardBlurbs[award.id];body.appendChild(bd);}
    const wlbl=document.createElement('label');wlbl.className='awi-label';wlbl.textContent='PERSONAL NOTE (included in write-up)';body.appendChild(wlbl);
    const ni=document.createElement('textarea');ni.className='awi-text';ni.placeholder=`e.g. "${winnerIdx!==null?fn(winnerIdx):'She'} always encouraged teammates..."`;ni.value=awardNotes[award.id]||'';ni.oninput=()=>{awardNotes[award.id]=ni.value;clearTimeout(saveTimer);saveTimer=setTimeout(save,600);};body.appendChild(ni);

    // Generate + Reroll button row
    const btnRow=document.createElement('div');btnRow.className='award-btns-row';
    const gb=document.createElement('button');gb.className='btn-gen';gb.textContent='✦ GENERATE';gb.onclick=()=>{const wi=override!==undefined?+override:(nominees.length?nominees[0].idx:null);if(wi===null){alert('Pick a player first.');return;}awardBlurbVariants[award.id]=0;awardBlurbs[award.id]=genBlurb(award,wi,awardNotes[award.id]||'',0);save();renderAwards();setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),80);};btnRow.appendChild(gb);
    if(awardBlurbs[award.id]){
      const rr=document.createElement('button');rr.className='btn-reroll';rr.textContent='🔄 REROLL';rr.onclick=()=>{const wi=override!==undefined?+override:(nominees.length?nominees[0].idx:null);if(wi===null)return;rerollBlurb(award.id,wi);setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),80);};btnRow.appendChild(rr);
    }
    body.appendChild(btnRow);

    const ovlbl=document.createElement('label');ovlbl.className='aov-label';ovlbl.textContent="COACH'S PICK — OVERRIDES AUTO-NOMINATION";body.appendChild(ovlbl);
    const os=document.createElement('select');os.className='aov-sel';os.innerHTML=`<option value="">— Choose a player —</option>`+roster.map((p,i)=>`<option value="${i}" ${override===String(i)?'selected':''}>${p.name}</option>`).join('');os.onchange=()=>{if(!os.value)delete awardOverrides[award.id];else awardOverrides[award.id]=os.value;delete awardBlurbs[award.id];delete awardBlurbVariants[award.id];save();renderAwards();};body.appendChild(os);
    card.appendChild(body);sc.appendChild(card);
  });

  // Ceremony export button at the bottom

// ── EXPORT PDF (combined lineup: batting order + defense by inning) ──────────
function exportPDF(){
  const card=document.getElementById('pdf-card');
  const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const st=seasonTotals();
  _setPrintPage('portrait');

  // ── BATTING ORDER ROWS ──
  const batRows=battingOrder.map((b,i)=>{
    const p=roster[b.idx];
    const s=st[b.idx];
    const statStr=s&&s.ab>0?`${s.avg.toFixed(3)} / ${s.obp.toFixed(3)}`:'—';
    const dispPos=getStartingPos(b.idx);
    return `<tr>
      <td class="bat-c-num">${i+1}</td>
      <td class="bat-c-name">${p.name}</td>
      <td class="bat-c-pos">${dispPos}</td>
      <td class="bat-c-stat">${statStr}</td>
    </tr>`;
  }).join('');

  // ── DEFENSE BY INNING (rows = players, cols = inning blocks) ──
  const usingBench=benchNeeded();
  const playerInnings={};
  // Include every roster player who isn't OUT for whole game
  roster.forEach((p,pi)=>{
    if(isOutWholeGame(pi))return;
    playerInnings[pi]=['','',''];
  });
  defBlocks.forEach((block,bi)=>{
    Object.entries(block.assignments).forEach(([pos,pi])=>{
      if(playerInnings[pi]!==undefined)playerInnings[pi][bi]=pos;
    });
    if(usingBench&&block.benchIdx!==null&&block.benchIdx!==undefined&&playerInnings[block.benchIdx]!==undefined){
      playerInnings[block.benchIdx][bi]='BENCH';
    }
    Object.keys(playerInnings).forEach(pi=>{
      const v=gameAbsences[pi];
      if(v===3&&bi===0)playerInnings[pi][0]='—';
      if(v===5&&(bi===0||bi===1))playerInnings[pi][bi]='—';
    });
  });

  // Sort defense table by batting order so it mirrors lineup order
  const orderIdx={};battingOrder.forEach((b,i)=>{orderIdx[b.idx]=i;});
  const defenseSorted=Object.keys(playerInnings)
    .map(pi=>+pi)
    .sort((a,b)=>{
      const oa=orderIdx[a]??999,ob=orderIdx[b]??999;
      return oa-ob;
    });

  const defRows=defenseSorted.map(pi=>{
    const p=roster[pi];
    const slots=playerInnings[pi];
    const cell=(v)=>{
      if(v==='BENCH')return `<td class="def-c-bench">BENCH</td>`;
      if(v==='—'||v==='')return `<td class="def-c-empty">—</td>`;
      const klass=IF_POS.has(v)?'def-c-if':'def-c-of';
      return `<td class="def-c-pos ${klass}">${v}</td>`;
    };
    return `<tr>
      <td class="def-c-name">${p.name}</td>
      ${cell(slots[0])}
      ${cell(slots[1])}
      ${cell(slots[2])}
    </tr>`;
  }).join('');

  // OUT players list
  const outPlayers=roster.map((p,i)=>isOutWholeGame(i)?p.name:null).filter(Boolean);
  const outLine=outPlayers.length?`<div class="pdf-out-line">OUT: ${outPlayers.join(', ')}</div>`:'';

  card.innerHTML=`
    <div style="font-family:'Barlow Condensed','Arial Narrow',sans-serif;color:#000;">
      <div class="pdf-hdr">
        <div>
          <div class="pdf-team">🌶️ RED HOT CHILI PEPPERS</div>
          <div class="pdf-sub">TVL MINORS 10B · LINEUP</div>
        </div>
        <div class="pdf-meta">
          <div><strong>${today}</strong></div>
          <div>vs. ___________________</div>
          <div>&#9744; Home &nbsp; &#9744; Away</div>
        </div>
      </div>

      <div class="pdf-section-label">BATTING ORDER</div>
      <table class="pdf-bat-c-table">
        <thead>
          <tr>
            <th class="c" style="width:24px;">#</th>
            <th>PLAYER</th>
            <th class="c" style="width:36px;">POS</th>
            <th style="width:88px;">AVG / OBP</th>
          </tr>
        </thead>
        <tbody>${batRows}</tbody>
      </table>

      <div class="pdf-section-label">DEFENSE BY INNING</div>
      <table class="pdf-def-c-table">
        <thead>
          <tr>
            <th>PLAYER</th>
            <th class="c">INN 1–2</th>
            <th class="c">INN 3–4</th>
            <th class="c">INN 5–6</th>
          </tr>
        </thead>
        <tbody>${defRows}</tbody>
      </table>
      ${outLine}

      <div class="pdf-rules" style="margin-top:9px;">
        <div class="pdf-rules-title">10B RULES — KNOW COLD</div>
        <div class="pdf-rule"><strong>WALKS/HBP:</strong> Bases loaded + ball 4 → coach pitches (count carries). No base on HBP when coach pitches.</div>
        <div class="pdf-rule"><strong>STEALING:</strong> No stealing home. No advance on overthrow during a steal. None when up 10+.</div>
        <div class="pdf-rule"><strong>BUNTING:</strong> 1 bunt batter per inning. No slash bunting (dead ball, out).</div>
        <div class="pdf-rule"><strong>SCORING:</strong> 4-run cap per inning (last inning unlimited). Run-ahead: 12 after 3, 10 after 4, 8 after 5.</div>
        <div class="pdf-rule"><strong>PITCHING:</strong> 3-inning limit. Out after 3 direct HBPs in an inning. Only the starter may return.</div>
        <div class="pdf-rule"><strong>DEFENSE:</strong> 10 fielders (4 OF). Max 6 IF at pitch release. No infield fly. No advance on dropped 3rd.</div>
      </div>
      <div class="pdf-footer">
        <span>🌶️ RED HOT CHILI PEPPERS · TVL MINORS 10B</span>
        <span>${today}</span>
      </div>
    </div>`;
  window.print();
}

  // Group awards by section — reorders to create a narrative arc for the ceremony
  const sections=[
    {label:'OFFENSE',keys:['cat-stat']},
    {label:'DEFENSE',keys:['cat-def']},
    {label:'GROWTH',keys:['cat-growth']},
    {label:'TEAM SPIRIT',keys:['cat-spirit','cat-fun']},
    {label:'LEADERSHIP',keys:['cat-team']}
  ];

  const winnerFor=(award)=>{
    const override=awardOverrides[award.id];
    if(override!==undefined)return+override;
    const noms=award.auto();
    return noms.length?noms[0].idx:null;
  };

  const blurbFor=(award)=>{
    const wi=winnerFor(award);
    if(wi===null)return null;
    if(awardBlurbs[award.id])return awardBlurbs[award.id];
    // Auto-generate if missing so the ceremony page is never blank
    return genBlurb(award,wi,awardNotes[award.id]||'',awardBlurbVariants[award.id]||0);
  };

  const sectionsHTML=sections.map(sec=>{
    const awardsInSection=AWARDS.filter(a=>sec.keys.includes(a.cat));
    const rows=awardsInSection.map(award=>{
      const wi=winnerFor(award);
      if(wi===null){
        return `<div class="pdf-award-row">
          <div class="pdf-award-emoji">${award.emoji}</div>
          <div class="pdf-award-body">
            <div class="pdf-award-name">${award.name}</div>
            <div style="font-size:9pt;color:#999;font-style:italic;margin-top:3px;">— to be announced —</div>
          </div>
        </div>`;
      }
      const blurb=blurbFor(award)||'';
      return `<div class="pdf-award-row">
        <div class="pdf-award-emoji">${award.emoji}</div>
        <div class="pdf-award-body">
          <div class="pdf-award-name">${award.name}</div>
          <div class="pdf-award-winner">${roster[wi].name}</div>
          <div class="pdf-award-blurb">${blurb}</div>
        </div>
      </div>`;
    }).join('');
    if(!rows)return '';
    return `<div class="pdf-ceremony-section">${sec.label}</div>${rows}`;
  }).join('');

  card.innerHTML=`<div class="pdf-ceremony">
    <div class="pdf-ceremony-hdr">
      <div class="pdf-ceremony-title" style="font-size:20pt;">🌶️ RED HOT CHILI PEPPERS</div>
      <div class="pdf-ceremony-sub">SEASON ${year} · AWARDS CEREMONY</div>
      <div class="pdf-ceremony-year">TVL MINORS 10B · ${dateStr}</div>
    </div>
    ${sectionsHTML}
    <div style="margin-top:22px;padding-top:10px;border-top:1.5px solid #C22818;text-align:center;font-size:9pt;color:#555;font-style:italic;line-height:1.6;">
      Every player on this roster earned her place here — on the field, in the dugout, and in the hearts of her teammates. This has been a privilege to coach.
    </div>
  </div>`;
  window.print();
}

// ── OFFLINE ───────────────────────────────────────────────────────────────────
function updateOnline(){const b=document.getElementById('offlineBar');if(b)b.classList.toggle('show',!navigator.onLine);}
window.addEventListener('online',updateOnline);window.addEventListener('offline',updateOnline);

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  if(!('serviceWorker' in navigator))return;
  try{const sw=`const C='h10b-v5';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['./','./index.html']).catch(()=>{})));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(!e.request.url.startsWith('http'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(resp=>{if(resp&&resp.status===200){const cl=resp.clone();caches.open(C).then(c=>c.put(e.request,cl));}return resp;}).catch(()=>new Response('Offline',{status:503}))));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'})),{scope:'./'}).catch(()=>{});}catch(e){}
});

// ── INIT ──────────────────────────────────────────────────────────────────────
function renderAll(){renderBatting();renderDefense();renderGameDay();renderSettings();renderStats();renderAwards();}
load();
applyGameDayInitialState();
defBlocks.forEach((b,bi)=>{if(!Object.keys(b.assignments).length)autoSuggest(bi);});
renderAll();
updateOnline();
</script>
