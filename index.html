/%3E%3Cpath%20d='M%20-20%20-52%20Q%20-8%20-60,%206%20-58'%20fill='none'%20stroke='%238ab455'%20stroke-width='2.5'%20stroke-linecap='round'%20opacity='0.8'/%3E%3C/g%3E%3Crect%20width='180'%20height='180'%20fill='url(%23glossD)'/%3E%3C/svg%3E" media="(prefers-color-scheme: dark)">

<style>
[data-theme="light"]{
  --bg:#F4F1E8;--panel:#FFFFFF;--panel2:#F0EDE3;
  --border:rgba(0,0,0,0.10);--border2:rgba(0,0,0,0.18);
  --ink:#0F1209;--ink2:#2e2e22;--muted:#6b6955;
  --clay:#C22818;--clay-d:#9E1A0A;--clay-l:#E03828;
  --grass:#1a7a38;--grass-l:#228a45;
  --gold:#9a6800;--good:#1a7a38;--warn:#b05a00;--bad:#b01818;--teal:#0a6a62;
  --tab-bg:#E2DED2;--tab-text:#5a5845;--shadow:rgba(0,0,0,0.10);
  --hot:#c03010;--cold:#0a6a80;
}
[data-theme="dark"]{
  --bg:#14181a;--panel:#1c2124;--panel2:#222a2e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --ink:#edeae2;--ink2:#ccc9be;--muted:rgba(237,234,226,0.45);
  --clay:#C2553A;--clay-d:#9E3E26;--clay-l:#e8705a;
  --grass:#2a5c3a;--grass-l:#3a7a50;
  --gold:#d4a84b;--good:#4caf72;--warn:#e0943a;--bad:#e05a5a;--teal:#3a8a82;
  --tab-bg:#1c2124;--tab-text:rgba(237,234,226,0.45);--shadow:rgba(0,0,0,0.35);
  --hot:#ff7043;--cold:#4dd0e1;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{background:var(--bg);color:var(--ink);font-family:'Barlow',sans-serif;min-height:100%;padding:0;max-width:430px;margin:0 auto;-webkit-text-size-adjust:100%;transition:background 0.2s,color 0.2s;}
.sticky-top{position:sticky;top:0;z-index:200;background:var(--bg);transition:background 0.2s;padding:max(env(safe-area-inset-top),12px) 14px 0;}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:10px;border-bottom:2px solid var(--border2);}
.hdr-left{display:flex;flex-direction:column;gap:2px;}
.logo{display:inline-flex;background:var(--clay);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:2.5px;padding:3px 10px;border-radius:20px;font-weight:700;margin-bottom:2px;}
.htitle{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;line-height:1.05;color:var(--ink);letter-spacing:0.5px;}
.htitle em{color:var(--clay);font-style:normal;}
.hsub{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:2px;color:var(--muted);font-weight:600;}
.save-ind{font-size:0.62rem;color:var(--good);letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;opacity:0;transition:opacity 0.4s;height:13px;display:block;font-weight:700;margin-top:2px;}
.save-ind.show{opacity:1;}
.theme-btn{width:54px;height:30px;border-radius:30px;background:var(--panel2);border:2px solid var(--border2);cursor:pointer;position:relative;flex-shrink:0;margin-top:2px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.theme-btn::before{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--clay);transition:transform 0.22s;}
[data-theme="dark"] .theme-btn::before{transform:translateX(24px);}
.theme-icons{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 5px;font-size:0.7rem;pointer-events:none;}
.tab-bar{display:grid;grid-template-columns:repeat(6,1fr);background:var(--tab-bg);border-radius:10px;padding:3px;gap:1px;margin:8px 0 0;border:1.5px solid var(--border2);box-shadow:0 2px 6px var(--shadow);}
.tab-btn{padding:9px 1px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:0.66rem;letter-spacing:1px;color:var(--tab-text);cursor:pointer;border-radius:7px;border:none;background:none;font-weight:700;min-height:44px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all 0.18s;}
.tab-btn.active{background:var(--clay);color:#fff;}
.offline-bar{display:none;background:var(--warn);color:#fff;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:2px;font-weight:700;padding:6px 14px;}
.offline-bar.show{display:block;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.tab-scroll{padding:14px 14px max(env(safe-area-inset-bottom),30px);}
.slabel{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;letter-spacing:3px;color:var(--muted);margin-bottom:9px;font-weight:700;}
.batting-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.brow{display:grid;grid-template-columns:44px 30px 1fr 58px 36px;align-items:center;gap:6px;background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;padding:9px 9px 9px 4px;box-shadow:0 1px 4px var(--shadow);user-select:none;-webkit-user-select:none;}
.brow.drag-over{border-color:var(--clay);box-shadow:0 0 0 2px var(--clay);}
.brow.dragging{opacity:0.4;}
.drag-handle{font-size:1.25rem;color:var(--muted);text-align:center;cursor:grab;touch-action:none;padding:6px 4px;min-height:48px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;border-radius:7px;}
.drag-handle:active{background:rgba(194,40,24,0.08);color:var(--clay);}
.bnum{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;color:var(--clay);text-align:center;line-height:1;}
.bnum.gold{color:var(--gold);}
.bname{font-weight:700;font-size:0.9rem;color:var(--ink);line-height:1.2;}
.bsub{font-size:0.68rem;color:var(--muted);margin-top:1px;}
.bstat{font-size:0.68rem;color:var(--good);margin-top:1px;font-weight:700;}
.bstreak{font-size:0.65rem;font-weight:700;margin-top:1px;}
.bstreak.hot{color:var(--hot);}
.bstreak.cold{color:var(--cold);}
/* EH badge styling */
.eh-badge{display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;letter-spacing:1px;font-weight:800;padding:1px 5px;border-radius:4px;margin-left:4px;background:rgba(154,104,0,0.15);color:var(--gold);vertical-align:middle;}
.pos-sel{background:var(--panel2);border:1.5px solid var(--border2);color:var(--ink);font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;font-weight:700;border-radius:7px;padding:5px 3px;width:100%;cursor:pointer;appearance:none;text-align:center;min-height:36px;}
.pos-sel:focus{outline:none;border-color:var(--clay);}
.arrow-btns{display:flex;flex-direction:column;gap:3px;}
.arr{width:36px;height:44px;background:var(--panel2);border:1.5px solid var(--border2);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:var(--ink2);-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all 0.15s;}
.arr:active,.arr:hover{background:var(--clay);border-color:var(--clay);color:#fff;}
.arr:disabled{opacity:0.18;pointer-events:none;}
.drag-ghost{position:fixed;z-index:9999;pointer-events:none;opacity:0.94;transform:scale(1.03) rotate(1deg);box-shadow:0 10px 36px rgba(0,0,0,0.32),0 0 0 2px var(--clay);border-radius:11px;background:var(--panel);border:1.5px solid var(--clay);transition:none;left:0;top:0;will-change:transform;}
.drag-ghost .arr{display:none;}
.drag-ghost .drag-handle{color:var(--clay);}
.brow{transition:transform 0.2s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.16s ease;}
.brow.dragging{opacity:0.22;transform:scale(0.97);}
.brow.shift-down{transform:translateY(calc(var(--row-h,72px) + 6px));}
.brow.shift-up{transform:translateY(calc(-1 * (var(--row-h,72px) + 6px)));}
.iblock{background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;margin-bottom:9px;overflow:hidden;box-shadow:0 2px 6px var(--shadow);}
.iblock-hdr{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--panel2);border-bottom:1.5px solid var(--border2);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.iblock-hdr-left{flex:1;}
.iblock-title{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;letter-spacing:2px;color:var(--ink);font-weight:800;}
.iblock-bench{font-size:0.7rem;color:var(--clay);margin-top:1px;font-weight:700;}
.iblock-chev{color:var(--muted);font-size:0.7rem;transition:transform 0.2s;}
.iblock-hdr.open .iblock-chev{transform:rotate(180deg);}
.iblock-body{display:none;padding:11px;}
.iblock-body.open{display:block;}
.bench-row{display:flex;align-items:center;gap:10px;background:rgba(194,40,24,0.07);border:1.5px solid rgba(194,40,24,0.25);border-radius:8px;padding:8px 11px;margin-bottom:9px;}
.bench-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:2px;color:var(--clay);white-space:nowrap;font-weight:700;}
.bench-sel{flex:1;background:transparent;border:none;color:var(--clay);font-family:'Barlow',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;appearance:none;}
.suggest-btn{background:var(--clay);color:#fff;border:none;border-radius:6px;padding:7px 12px;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:2px;cursor:pointer;font-weight:700;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.suggest-btn:active{background:var(--clay-d);}

/* BAT tab top action bar (Suggest Order + Game Day toggle) */
.bat-action-bar{display:flex;gap:7px;margin-bottom:10px;}
.suggest-order-btn{flex:1;background:var(--clay);color:#fff;border:none;border-radius:9px;padding:10px 12px;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;letter-spacing:2px;cursor:pointer;font-weight:700;-webkit-tap-highlight-color:transparent;min-height:42px;}
.suggest-order-btn:active{background:var(--clay-d);}
.gameday-btn{background:var(--panel);color:var(--ink);border:1.5px solid var(--border2);border-radius:9px;padding:10px 14px;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;letter-spacing:2px;cursor:pointer;font-weight:700;-webkit-tap-highlight-color:transparent;min-height:42px;white-space:nowrap;}
.gameday-btn.on{background:var(--grass);border-color:var(--grass-l);color:#fff;}
.gameday-btn:active{transform:scale(0.97);}

/* Suggestion preview panel */
.suggest-preview{background:var(--panel);border:2px solid var(--clay);border-radius:11px;padding:12px 13px;margin-bottom:12px;box-shadow:0 3px 12px rgba(194,40,24,0.18);}
.suggest-preview-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.suggest-preview-title{font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;letter-spacing:2px;color:var(--clay);font-weight:800;}
.suggest-preview-rationale{font-size:0.72rem;color:var(--muted);margin-bottom:10px;line-height:1.4;font-style:italic;}
.suggest-preview-list{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.spv-row{display:grid;grid-template-columns:26px 1fr auto;gap:8px;align-items:center;background:var(--panel2);border-radius:6px;padding:5px 9px;font-size:0.82rem;}
.spv-num{font-family:'Barlow Condensed',sans-serif;font-weight:800;color:var(--clay);}
.spv-name{font-weight:700;color:var(--ink);}
.spv-role{font-size:0.66rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:700;text-align:right;}
.suggest-preview-btns{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.spv-apply{background:var(--grass);color:#fff;border:none;border-radius:7px;padding:9px;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;letter-spacing:2px;cursor:pointer;font-weight:700;min-height:40px;-webkit-tap-highlight-color:transparent;}
.spv-cancel{background:transparent;color:var(--muted);border:1.5px solid var(--border2);border-radius:7px;padding:9px;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;letter-spacing:2px;cursor:pointer;font-weight:700;min-height:40px;-webkit-tap-highlight-color:transparent;}

/* Rally killer warning chip (on batting rows) */
.rally-warn{display:inline-flex;align-items:center;gap:3px;font-family:'Barlow Condensed',sans-serif;font-size:0.58rem;letter-spacing:1px;font-weight:800;padding:1px 5px;border-radius:4px;margin-left:4px;background:rgba(176,90,0,0.16);color:var(--warn);vertical-align:middle;border:1px solid rgba(176,90,0,0.4);}

/* Game Day Mode */
body.gameday .tab-bar{grid-template-columns:repeat(3,1fr);}
body.gameday .tab-btn.gd-hide{display:none;}
body.gameday .sticky-bottom-quickref{display:flex;}
body.gameday .tab-scroll{padding-bottom:80px;}
.sticky-bottom-quickref{display:none;position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;background:var(--panel);border-top:2px solid var(--clay);padding:8px 14px max(env(safe-area-inset-bottom),10px);z-index:190;box-shadow:0 -4px 14px var(--shadow);align-items:center;gap:10px;flex-wrap:wrap;justify-content:space-between;}
.qr-label{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;letter-spacing:2px;color:var(--clay);font-weight:800;white-space:nowrap;}
.qr-text{font-size:0.7rem;color:var(--ink2);line-height:1.3;font-weight:600;}
.qr-text strong{color:var(--clay);}

/* CSV Preview Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;align-items:flex-end;justify-content:center;padding:0;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:var(--panel);width:100%;max-width:430px;max-height:88vh;border-radius:16px 16px 0 0;display:flex;flex-direction:column;box-shadow:0 -8px 32px rgba(0,0,0,0.4);}
.modal-hdr{padding:14px 16px 10px;border-bottom:1.5px solid var(--border2);}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:1px;color:var(--ink);}
.modal-sub{font-size:0.74rem;color:var(--muted);margin-top:3px;line-height:1.45;}
.modal-body{flex:1;overflow-y:auto;padding:12px 16px;-webkit-overflow-scrolling:touch;}
.modal-footer{padding:10px 16px max(env(safe-area-inset-bottom),14px);border-top:1.5px solid var(--border2);display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--panel2);}
.match-row{display:grid;grid-template-columns:1fr 18px 1fr;gap:6px;align-items:center;padding:7px 9px;background:var(--panel2);border:1.5px solid var(--border2);border-radius:9px;margin-bottom:5px;}
.match-row.unmatched{border-color:var(--bad);background:rgba(176,24,24,0.07);}
.match-row.perfect{border-color:var(--good);}
.match-roster{font-size:0.82rem;font-weight:700;color:var(--ink);}
.match-roster-sub{font-size:0.66rem;color:var(--muted);margin-top:1px;}
.match-arrow{color:var(--muted);text-align:center;font-size:0.75rem;}
.match-csv{background:transparent;border:none;color:var(--ink);font-size:0.82rem;font-weight:700;cursor:pointer;appearance:none;padding:4px 2px;width:100%;}
.match-csv.unmatched{color:var(--bad);}
.match-quality{display:inline-block;font-size:0.56rem;font-weight:800;padding:1px 4px;border-radius:3px;margin-left:4px;letter-spacing:1px;vertical-align:middle;}
.mq-perfect{background:rgba(26,122,56,0.18);color:var(--good);}
.mq-fuzzy{background:rgba(176,90,0,0.18);color:var(--warn);}
.mq-manual{background:rgba(10,106,98,0.18);color:var(--teal);}
.mq-none{background:rgba(176,24,24,0.18);color:var(--bad);}

/* Award reroll button */
.award-btns-row{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.btn-reroll{background:var(--panel2);color:var(--ink);border:1.5px solid var(--border2);border-radius:7px;padding:7px 12px;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:1.5px;cursor:pointer;font-weight:700;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-reroll:active{background:var(--border);}

/* GAME tab — absence controls */
.gd-intro{background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;padding:12px 14px;margin-bottom:10px;font-size:0.8rem;color:var(--ink2);line-height:1.55;box-shadow:0 2px 6px var(--shadow);}
.gd-intro strong{color:var(--ink);font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}

.gd-status{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.gd-status-cell{background:var(--panel);border:1.5px solid var(--border2);border-radius:9px;padding:8px 6px;text-align:center;box-shadow:0 1px 4px var(--shadow);}
.gd-status-cell.warn{border-color:var(--bad);background:rgba(176,24,24,0.06);}
.gd-status-cell.ok{border-color:var(--good);}
.gd-status-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;letter-spacing:2px;color:var(--muted);font-weight:700;}
.gd-status-num{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:800;color:var(--ink);line-height:1;margin-top:3px;}
.gd-status-cell.warn .gd-status-num{color:var(--bad);}
.gd-status-cell.ok .gd-status-num{color:var(--good);}
.gd-status-sub{font-size:0.58rem;color:var(--muted);margin-top:2px;}

/* Absence row — compact player + 4 options */
.absence-row{background:var(--panel);border:1.5px solid var(--border2);border-radius:10px;padding:8px 10px;margin-bottom:6px;box-shadow:0 1px 3px var(--shadow);}
.absence-name{font-weight:700;font-size:0.9rem;color:var(--ink);margin-bottom:6px;}
.absence-name .abs-status{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;letter-spacing:1.5px;padding:1px 6px;border-radius:4px;margin-left:6px;font-weight:800;vertical-align:middle;}
.abs-status.playing{color:var(--good);background:rgba(26,122,56,0.12);}
.abs-status.late{color:var(--warn);background:rgba(176,90,0,0.14);}
.abs-status.out{color:var(--bad);background:rgba(176,24,24,0.12);}
.absence-opts{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.abs-opt{background:var(--panel2);border:1.5px solid var(--border2);color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;letter-spacing:1px;font-weight:700;padding:6px 2px;border-radius:6px;cursor:pointer;min-height:34px;text-align:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:flex;align-items:center;justify-content:center;line-height:1.1;}
.abs-opt:active{transform:scale(0.97);}
.abs-opt.sel-playing{background:var(--good);border-color:var(--good);color:#fff;}
.abs-opt.sel-late{background:var(--warn);border-color:var(--warn);color:#fff;}
.abs-opt.sel-out{background:var(--bad);border-color:var(--bad);color:#fff;}

/* Preview panel for the game-day rebuild */
.gd-preview{background:var(--panel);border:2px solid var(--clay);border-radius:11px;padding:12px 13px;margin-bottom:12px;box-shadow:0 3px 12px rgba(194,40,24,0.18);}
.gd-preview-title{font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;letter-spacing:2px;color:var(--clay);font-weight:800;margin-bottom:7px;}
.gd-preview-section{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:2px;color:var(--muted);font-weight:800;margin:9px 0 4px;}
.gd-preview-list{font-size:0.78rem;color:var(--ink2);line-height:1.5;margin-bottom:3px;}
.gd-preview-list strong{color:var(--ink);}

/* Banner on BAT tab when absences are active */
.absence-banner{display:flex;align-items:center;gap:8px;background:rgba(176,90,0,0.10);border:1.5px solid rgba(176,90,0,0.35);border-radius:9px;padding:8px 11px;margin-bottom:10px;}
.absence-banner-icon{font-size:1rem;flex-shrink:0;}
.absence-banner-text{font-size:0.76rem;color:var(--warn);font-weight:700;line-height:1.3;}
.absence-banner-text strong{color:var(--ink);}

/* Clear button */
.btn-clear-abs{background:transparent;border:1.5px solid var(--border2);color:var(--muted);border-radius:7px;padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:2px;cursor:pointer;font-weight:700;margin-top:8px;width:100%;-webkit-tap-highlight-color:transparent;}
.def-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.def-cell{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1.5px solid var(--border2);border-radius:8px;padding:7px 10px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:border-color 0.15s,background 0.15s;}
.def-cell.swap-source{border-color:var(--clay);background:rgba(194,40,24,0.08);box-shadow:0 0 0 2px var(--clay);}
.def-cell.swap-target{border-color:var(--grass);background:rgba(26,122,56,0.09);box-shadow:0 0 0 2px var(--grass);}
.def-cell.swap-target:active{background:rgba(26,122,56,0.18);}
.swap-hint{font-family:'Barlow Condensed',sans-serif;font-size:0.68rem;letter-spacing:2px;color:var(--clay);text-align:center;padding:5px 0 2px;font-weight:700;opacity:0;transition:opacity 0.2s;}
.swap-hint.show{opacity:1;}
.mode-banner{background:var(--panel2);border:1.5px solid var(--border2);border-radius:9px;padding:9px 12px;margin-bottom:10px;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;letter-spacing:1.5px;color:var(--ink);font-weight:700;text-align:center;}
.def-pos{font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;color:var(--clay);min-width:26px;letter-spacing:1px;font-weight:800;}
.def-pname{flex:1;font-size:0.85rem;font-weight:700;color:var(--ink);}
.def-psel{flex:1;background:transparent;border:none;color:var(--ink);font-size:0.82rem;font-weight:700;cursor:pointer;appearance:none;}
.fit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fit-g{background:var(--good);}
.fit-o{background:var(--warn);}
.fit-w{background:var(--bad);}
.fit-legend{display:flex;gap:12px;margin-bottom:9px;flex-wrap:wrap;}
.fit-legend span{font-size:0.67rem;color:var(--muted);display:flex;align-items:center;gap:4px;font-weight:600;}
.rot-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:2px;padding:3px 9px;border-radius:12px;margin-bottom:8px;font-weight:700;}
.rot-good{background:rgba(26,122,56,0.12);color:var(--good);border:1px solid rgba(26,122,56,0.3);}
.rot-warn{background:rgba(176,90,0,0.12);color:var(--warn);border:1px solid rgba(176,90,0,0.3);}
.fp-banner{display:flex;align-items:center;gap:10px;background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;padding:11px 13px;margin-bottom:10px;box-shadow:0 2px 6px var(--shadow);}
.fp-icon{font-size:1.2rem;flex-shrink:0;}
.fp-text{flex:1;}
.fp-label{font-family:'Barlow Condensed',sans-serif;font-size:0.88rem;letter-spacing:1.5px;font-weight:800;color:var(--ink);}
.fp-sub{font-size:0.67rem;color:var(--muted);margin-top:1px;line-height:1.4;}
.fp-toggle{position:relative;width:48px;height:27px;flex-shrink:0;}
.fp-toggle input{opacity:0;width:0;height:0;position:absolute;}
.fp-slider{position:absolute;inset:0;background:var(--panel2);border:1.5px solid var(--border2);border-radius:27px;cursor:pointer;transition:all 0.22s;}
.fp-slider::before{content:'';position:absolute;top:3px;left:3px;width:17px;height:17px;border-radius:50%;background:var(--muted);transition:all 0.22s;}
.fp-toggle input:checked+.fp-slider{background:var(--grass);border-color:var(--grass-l);}
.fp-toggle input:checked+.fp-slider::before{transform:translateX(21px);background:#fff;}
.fp-compliance{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.fp-chip{font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;letter-spacing:1px;padding:3px 8px;border-radius:10px;font-weight:700;}
.fp-chip-ok{background:rgba(26,122,56,0.12);color:var(--good);border:1px solid rgba(26,122,56,0.3);}
.fp-chip-warn{background:rgba(176,90,0,0.12);color:var(--warn);border:1px solid rgba(176,90,0,0.3);}
.spc{background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;margin-bottom:8px;overflow:hidden;box-shadow:0 2px 6px var(--shadow);}
.spc-hdr{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--panel2);border-bottom:1.5px solid var(--border2);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.spc-name{font-family:'Barlow Condensed',sans-serif;font-size:0.98rem;font-weight:800;color:var(--ink);flex:1;}
.spc-rank{font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;color:var(--gold);background:rgba(154,104,0,0.12);border:1.5px solid rgba(154,104,0,0.3);border-radius:5px;padding:2px 8px;font-weight:700;}

/* Dual-rank badges on roster cards */
.spc-ranks{display:flex;gap:4px;}
.spc-rank-badge{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;border-radius:5px;padding:2px 7px;font-weight:700;letter-spacing:0.5px;display:inline-flex;align-items:center;gap:3px;}
.spc-rank-manual{color:var(--gold);background:rgba(154,104,0,0.12);border:1.5px solid rgba(154,104,0,0.3);}
.spc-rank-stat{color:var(--teal);background:rgba(10,106,98,0.12);border:1.5px solid rgba(10,106,98,0.3);}
.spc-rank-stat.no-data{color:var(--muted);background:var(--panel);border:1.5px solid var(--border2);}

/* Roster name edit field */
.name-edit{background:var(--panel2);border:1.5px solid var(--border2);color:var(--ink);border-radius:7px;padding:6px 10px;font-family:'Barlow',sans-serif;font-size:0.88rem;font-weight:700;width:100%;}
.name-edit:focus{outline:none;border-color:var(--clay);}

/* Remove player button */
.btn-remove-player{background:transparent;border:1.5px solid var(--bad);color:var(--bad);border-radius:7px;padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;letter-spacing:2px;cursor:pointer;font-weight:700;margin-top:8px;-webkit-tap-highlight-color:transparent;}

/* Add player */
.add-player-card{background:var(--panel);border:2px dashed var(--border2);border-radius:11px;padding:12px 14px;margin-bottom:8px;}
.add-player-title{font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;letter-spacing:2px;color:var(--muted);font-weight:800;margin-bottom:8px;}
.add-player-row{display:grid;grid-template-columns:1fr 70px 72px;gap:6px;align-items:center;}
.btn-add{background:var(--grass);color:#fff;border:none;border-radius:7px;padding:9px 6px;font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;letter-spacing:1.5px;cursor:pointer;font-weight:700;min-height:40px;-webkit-tap-highlight-color:transparent;}
.btn-add:active{background:var(--grass-l);}

/* Backup / Restore buttons */
.br-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.btn-backup{background:var(--teal);color:#fff;border:none;border-radius:9px;padding:11px 10px;font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:2px;cursor:pointer;font-weight:700;-webkit-tap-highlight-color:transparent;min-height:44px;}
.btn-restore{background:var(--panel);color:var(--teal);border:1.5px solid var(--teal);border-radius:9px;padding:11px 10px;font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:2px;cursor:pointer;font-weight:700;-webkit-tap-highlight-color:transparent;min-height:44px;}
.btn-backup:active,.btn-restore:active{transform:scale(0.97);}
.br-note{font-size:0.7rem;color:var(--muted);margin-bottom:12px;line-height:1.4;text-align:center;}
.spc-body{display:none;padding:11px 13px;}
.spc-body.open{display:block;}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.srow label{font-size:0.75rem;color:var(--muted);min-width:68px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;font-weight:700;}
.ninput{background:var(--panel2);border:1.5px solid var(--border2);color:var(--ink);border-radius:7px;padding:5px 8px;font-size:0.9rem;font-family:'Barlow Condensed',sans-serif;width:58px;text-align:center;font-weight:700;}
.ninput:focus{outline:none;border-color:var(--clay);}
.pos-grid{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.ptog{display:flex;align-items:center;background:var(--panel2);border:1.5px solid var(--border2);border-radius:7px;padding:5px 9px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.14s;}
.ptog.pri{background:rgba(194,40,24,0.10);border-color:var(--clay);}
.ptog.sec{background:rgba(10,106,98,0.10);border-color:var(--teal);}
.ptog-lbl{font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;letter-spacing:1px;color:var(--muted);font-weight:700;}
.ptog.pri .ptog-lbl{color:var(--clay);}
.ptog.sec .ptog-lbl{color:var(--teal);}
.pos-legend{display:flex;gap:12px;margin-bottom:9px;flex-wrap:wrap;}
.pos-legend span{font-size:0.68rem;color:var(--muted);display:flex;align-items:center;gap:4px;font-weight:600;}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.btn-green{width:100%;padding:12px;background:var(--grass);color:#fff;border:none;border-radius:9px;font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;letter-spacing:3px;cursor:pointer;font-weight:700;margin-top:5px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.btn-red-outline{width:100%;padding:11px;background:transparent;color:var(--bad);border:1.5px solid var(--bad);border-radius:9px;font-family:'Barlow Condensed',sans-serif;font-size:0.85rem;letter-spacing:2px;cursor:pointer;margin-top:8px;font-weight:700;-webkit-tap-highlight-color:transparent;}
.upload-zone{background:var(--panel);border:2.5px dashed var(--border2);border-radius:12px;padding:22px 16px;text-align:center;margin-bottom:10px;box-shadow:0 2px 6px var(--shadow);}
.upload-zone.over{border-color:var(--clay);}
.upload-h{font-family:'Barlow Condensed',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--ink);margin-bottom:4px;font-weight:800;}
.upload-p{font-size:0.77rem;color:var(--muted);line-height:1.5;margin-bottom:10px;}
.btn-clay{display:inline-block;background:var(--clay);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;letter-spacing:2px;padding:8px 18px;border-radius:8px;cursor:pointer;border:none;font-weight:700;-webkit-tap-highlight-color:transparent;}
.gamelog{background:var(--panel);border:1.5px solid var(--border2);border-radius:11px;padding:12px 14px;margin-bottom:10px;box-shadow:0 2px 6px var(--shadow);}
.gamelog h4{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:2px;color:var(--clay);margin-bottom:10px;font-weight:800;}
.glog-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.glog-row:last-child{border-bottom:none;}
.src-row{padding-left:10px;border-left:4px solid transparent;margin-left:-4px;transition:opacity 0.2s;}
.src-row.src-csv{border-left-color:#2d7a4a;}
.src-row.src-image{border-left-color:#d4a017;}
.src-row.superseded{opacity:0.5;}
.src-row.superseded .glog-label{text-decoration:line-through;text-decoration-thickness:1.5px;}
.src-badge{display:inline-block;font-size:0.72rem;font-weight:700;padding:1px 5px;border-radius:4px;vertical-align:middle;}
.src-badge.src-img{background:rgba(212,160,23,0.18);color:#a87a0a;}
.src-badge.src-csv{background:rgba(45,122,74,0.15);color:#1e5a36;}
.src-badge.src-sup{background:rgba(214,36,24,0.12);color:#a8190f;font-family:'Barlow Condensed',sans-serif;letter-spacing:1.2px;font-size:0.62rem;padding:2px 6px;margin-left:6px;}
.glog-num{font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;letter-spacing:1px;color:var(--muted);min-width:52px;font-weight:700;}
.glog-label{font-size:0.82rem;color:var(--ink);font-weight:700;flex:1;}
.glog-delta{font-size:0.72rem;color:var(--good);font-weight:700;}

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const FIELD_POS=['P','C','1B','2B','3B','SS','LF','LC','CF','RF'];

const POS_PRI=['P','C','SS','3B','1B','2B','CF','LF','LC','RF'];

  {name:'Quinn Scorzella',age:10,rank:6,strengths:{'2B':2,'3B':1,SS:1,LF:1,CF:1,RF:1,LC:1}},
  {name:'Mackenzie Mello',age:9,rank:7,strengths:{P:1,C:1,SS:1,'2B':1,'3B':1,'1B':1,LF:1,CF:1,RF:1,LC:1}},
  {name:'Hana Hafez',age:10,rank:8,strengths:{'1B':2,'2B':1,CF:2,LF:1,RF:1,LC:1}},

let awardOverrides={},awardNotes={},awardBlurbs={},gameLog=[];

let battingOrder=[

let dragRowH=72,rafPending=false,lastDestIdx=null,rowRects=[];

// ── STATS HELPERS ─────────────────────────────────────────────────────────────
// Returns indexes of games that count toward season stats (excludes superseded)
function activeGameIdxs(){return gameLog.map((g,i)=>g.superseded?-1:i).filter(i=>i>=0);}
function seasonTotals(){const a=activeGameIdxs();return a.length?gameLog[a[a.length-1]].cumTotals:{};}
function gameDelta(i){
  if(gameLog[i].superseded)return{};
  const a=activeGameIdxs();
  const pos=a.indexOf(i);
  const prevIdx=pos>0?a[pos-1]:-1;
  const c=gameLog[i].cumTotals,p=prevIdx>=0?gameLog[prevIdx].cumTotals:{};
  const d={};
  Object.keys(c).forEach(pi=>{
    const cv=c[pi],pv=p[pi]||{ab:0,h:0,bb:0,pa:0,s2:0,s3:0,hr:0,sb:0,gp:0};
    const ab=(cv.ab||0)-(pv.ab||0),h=(cv.h||0)-(pv.h||0),bb=(cv.bb||0)-(pv.bb||0),pa=(cv.pa||0)-(pv.pa||0);
    d[pi]={ab,h,bb,pa,s2:(cv.s2||0)-(pv.s2||0),s3:(cv.s3||0)-(pv.s3||0),hr:(cv.hr||0)-(pv.hr||0),sb:(cv.sb||0)-(pv.sb||0),gp:(cv.gp||0)-(pv.gp||0),avg:ab>0?h/ab:null,obp:pa>0?(h+bb)/pa:null};
  });
  return d;
}
function recentStats(n=3){
  const r={},a=activeGameIdxs(),s=Math.max(0,a.length-n);
  for(let k=s;k<a.length;k++){const i=a[k];const d=gameDelta(i);Object.keys(d).forEach(pi=>{if(!r[pi])r[pi]={ab:0,h:0,bb:0,pa:0,s2:0,s3:0,hr:0,sb:0,gp:0};['ab','h','bb','pa','s2','s3','hr','sb','gp'].forEach(k=>r[pi][k]+=(d[pi][k]||0));});}
  Object.keys(r).forEach(pi=>{r[pi].avg=r[pi].ab>0?r[pi].h/r[pi].ab:null;r[pi].obp=r[pi].pa>0?(r[pi].h+r[pi].bb)/r[pi].pa:null;});
  return r;
}
function bestStretch(){
  const a=activeGameIdxs();
  if(!a.length)return{};
  const best={};
  roster.forEach((_,ri)=>{
    const pg=a.map(i=>gameDelta(i)[ri]||{ab:0,h:0,bb:0,pa:0,sb:0,s2:0,s3:0,hr:0});
    let bA=-1,bD=null,bW='';
    const ws=Math.min(3,a.length);
    for(let s=0;s<=a.length-ws;s++){
      let ab=0,h=0,bb=0,pa=0,sb=0,s2=0,s3=0,hr=0;
      for(let j=s;j<s+ws;j++){ab+=pg[j].ab||0;h+=pg[j].h||0;bb+=pg[j].bb||0;pa+=pg[j].pa||0;sb+=pg[j].sb||0;s2+=pg[j].s2||0;s3+=pg[j].s3||0;hr+=pg[j].hr||0;}
      const avg=ab>0?h/ab:-1;
      if(avg>bA){bA=avg;bD={ab,h,bb,pa,sb,s2,s3,hr,avg,obp:pa>0?(h+bb)/pa:0};bW=`G${s+1}–G${s+ws}`;}
    }
    if(bD)best[ri]={...bD,window:bW};
  });
  return best;
}
function streakLabel(idx){
  const s=seasonTotals()[idx],r=recentStats(3)[idx];
  if(!s||!s.ab||s.ab<3||!r||!r.ab||r.ab<2)return null;
  const d=r.avg-s.avg;
  if(d>0.08)return{label:'🔥 Hot L3',cls:'hot'};
  if(d<-0.08)return{label:'❄️ Cold L3',cls:'cold'};
  return null;
}

// ── STAT-DERIVED RANK ─────────────────────────────────────────────────────
// Returns: {rank: 1..N, hasData: bool, score: number}
// Score = weighted combination of OBP (primary), AVG, XBH rate, and SB rate.
// Players without qualifying plate appearances fall to the bottom but keep
// relative ordering by draft rank among themselves.
function statRanks(){
  const totals=seasonTotals();
  const scored=roster.map((p,i)=>{
    const s=totals[i];
    const qualifies=s&&(s.pa||0)>=4&&(s.ab||0)>=3;
    if(!qualifies)return{idx:i,hasData:false,score:-1,manualRank:p.rank};
    const xbh=(s.s2||0)+(s.s3||0)+(s.hr||0);
    const xbhRate=s.ab>0?xbh/s.ab:0;
    const sbRate=s.gp>0?(s.sb||0)/s.gp:0;
    // OBP gets 55%, AVG 25%, XBH rate 15%, SB rate 5%
    const score=((s.obp||0)*0.55)+((s.avg||0)*0.25)+(xbhRate*0.15)+(Math.min(sbRate,2)*0.05);
    return{idx:i,hasData:true,score,manualRank:p.rank};
  });
  // Rank players with data by score desc; players without data go after, ordered by manual rank
  const withData=scored.filter(x=>x.hasData).sort((a,b)=>b.score-a.score);
  const noData=scored.filter(x=>!x.hasData).sort((a,b)=>a.manualRank-b.manualRank);
  const result={};
  let rk=1;
  withData.forEach(x=>{result[x.idx]={rank:rk++,hasData:true,score:x.score};});
  noData.forEach(x=>{result[x.idx]={rank:rk++,hasData:false,score:null};});
  return result;
}

// effRank — used by defense auto-suggest to prefer stronger hitters at priority
// positions. Uses statRank when available; falls back to manual rank otherwise.
// Lower = better (1 is best).
function effRank(idx){
  const sr=statRanks()[idx];
  if(sr&&sr.hasData)return sr.rank;
  return roster[idx].rank;
}

// ── AUTO-SUGGEST DEFENSE ──────────────────────────────────────────────────────
const IF_POS=new Set(['P','C','1B','2B','3B','SS']);
const OF_POS=new Set(['LF','LC','CF','RF']);
function isOutWholeGame(idx){return gameAbsences[idx]===99;}
// Players actually available to play (roster minus OUT)
function effectivePlayerCount(){return roster.filter((_,i)=>!isOutWholeGame(i)).length;}
// Field positions to fill given current available player count.
// 11+ players => 10 fielders + 1 bench
// 10 players  => 10 fielders, no bench
//  9 players  => 9 fielders (drop LC), no bench
//  8 players  => 8 fielders (drop LC + RF), no bench
// <8 players  => still try 8-position layout (insufficient — UI will warn)
function activeFieldPositions(){
  const n=effectivePlayerCount();
  if(n>=10)return ['P','C','SS','3B','1B','2B','CF','LF','LC','RF'];
  if(n===9) return ['P','C','SS','3B','1B','2B','CF','LF','RF'];
  return ['P','C','SS','3B','1B','2B','CF','LF']; // 8 or fewer
}
// Bench is only used when there are extra players (>=11 effective)
function benchNeeded(){return effectivePlayerCount()>=11;}
// Strip assignments for positions that don't exist in current mode (e.g., LC when 9-player)
// and clear bench when not needed. Called whenever effective count may change.
function reconcileDefBlocksToMode(){
  const validPos=new Set(activeFieldPositions());
  const usingBench=benchNeeded();
  defBlocks.forEach(b=>{
    Object.keys(b.assignments).forEach(p=>{
      if(!validPos.has(p))delete b.assignments[p];
    });
    // Clear bench if not used
    if(!usingBench)b.benchIdx=null;
    // If a player is OUT but still assigned somewhere, drop the assignment
    Object.keys(b.assignments).forEach(p=>{
      if(isOutWholeGame(b.assignments[p]))delete b.assignments[p];
    });
    // If bench player is OUT, clear bench
    if(b.benchIdx!==null&&b.benchIdx!==undefined&&isOutWholeGame(b.benchIdx))b.benchIdx=null;
  });
}
// Build a human label for current mode
function modeLabel(){
  const n=effectivePlayerCount();
  if(n>=11)return `${n} PLAYERS • 10 FIELDERS + 1 BENCH`;
  if(n===10)return `10 PLAYERS • ALL FIELD, NO BENCH`;
  if(n===9) return `9 PLAYERS • NO BENCH, NO LC`;
  if(n===8) return `8 PLAYERS • NO BENCH, NO LC OR RF`;
  return `⚠ ONLY ${n} PLAYERS — INSUFFICIENT TO FIELD`;
}

function buildSuggest(benchIdx,prev,pp,allBlocks){
  // Exclude OUT players from pool. If no bench is needed (<=10 effective), benchIdx is ignored.
  const positions=activeFieldPositions();
  const usingBench=benchNeeded();
  const pool=roster.map((_,i)=>i).filter(i=>!isOutWholeGame(i)&&(!usingBench||i!==benchIdx));
  const assigned={},used=new Set();
  const prevMap={};if(prev)Object.entries(prev).forEach(([p,pi])=>prevMap[pi]=p);
  const ppMap={};if(pp)Object.entries(pp).forEach(([p,pi])=>ppMap[pi]=p);
  function sc(pi,pos){return(roster[pi].strengths[pos]||0)*10+(10-effRank(pi))+(prevMap[pi]===pos?-8:0)+(pp&&ppMap[pi]===pos?2:0);}
  const posSet=new Set(positions);
  if(fairPlayMode&&allBlocks){
    const ifCount={},ofCount={};
    pool.forEach(pi=>{ifCount[pi]=0;ofCount[pi]=0;});
    (allBlocks||[]).forEach(b=>{if(!b||!b.assignments)return;Object.entries(b.assignments).forEach(([pos,pi])=>{if(IF_POS.has(pos))ifCount[pi]=(ifCount[pi]||0)+2;if(OF_POS.has(pos))ofCount[pi]=(ofCount[pi]||0)+2;});});
    const needsIF=pool.filter(pi=>ifCount[pi]===0);
    const needsOF=pool.filter(pi=>ofCount[pi]===0);
    const ifPositions=[...IF_POS].filter(p=>posSet.has(p));
    const ofPositions=[...OF_POS].filter(p=>posSet.has(p));
    const usedPos=new Set();
    const sortedNeedsIF=[...needsIF].sort((a,b)=>{const bA=Math.max(...ifPositions.map(p=>roster[a].strengths[p]||0));const bB=Math.max(...ofPositions.map(p=>roster[b].strengths[p]||0));return bB-bA;});
    sortedNeedsIF.forEach(pi=>{if(used.has(pi))return;const best=ifPositions.filter(p=>!usedPos.has(p)).sort((a,b)=>sc(pi,b)-sc(pi,a))[0];if(best){assigned[best]=pi;used.add(pi);usedPos.add(best);}});
    const sortedNeedsOF=[...needsOF].sort((a,b)=>{const bA=Math.max(...ofPositions.map(p=>roster[a].strengths[p]||0));const bB=Math.max(...ofPositions.map(p=>roster[b].strengths[p]||0));return bB-bA;});
    sortedNeedsOF.forEach(pi=>{if(used.has(pi))return;const best=ofPositions.filter(p=>!usedPos.has(p)).sort((a,b)=>sc(pi,b)-sc(pi,a))[0];if(best){assigned[best]=pi;used.add(pi);usedPos.add(best);}});
    for(const pos of positions){if(assigned[pos]!==undefined)continue;const cands=pool.filter(i=>!used.has(i)).sort((a,b)=>sc(b,pos)-sc(a,pos));if(cands.length){assigned[pos]=cands[0];used.add(cands[0]);}}
  }else{
    for(const pos of positions){const cands=pool.filter(i=>!used.has(i)).sort((a,b)=>sc(b,pos)-sc(a,pos));if(cands.length){assigned[pos]=cands[0];used.add(cands[0]);}}
  }
  if(prev){
    let changed=0;pool.forEach(pi=>{const np=Object.entries(assigned).find(([,v])=>v===pi)?.[0];if(prevMap[pi]!==np)changed++;});
    if(changed<=pool.length/2){
      const same=pool.filter(pi=>{const np=Object.entries(assigned).find(([,v])=>v===pi)?.[0];return prevMap[pi]===np;});
      for(let i=0;i<same.length-1&&changed<=pool.length/2;i++){const a=same[i],b=same[i+1];const pa=Object.entries(assigned).find(([,v])=>v===a)?.[0];const pb=Object.entries(assigned).find(([,v])=>v===b)?.[0];if(pa&&pb&&pa!==pb&&(roster[a].strengths[pb]||0)>0&&(roster[b].strengths[pa]||0)>0){assigned[pa]=b;assigned[pb]=a;changed+=2;}}
    }
  }
  return assigned;
}
function autoSuggest(bi){
  const prev=bi>0?defBlocks[bi-1].assignments:null;
  const pp=bi>1?defBlocks[bi-2].assignments:null;
  const priorBlocks=bi>0?defBlocks.slice(0,bi).map(b=>b.assignments?{assignments:b.assignments}:null):null;
  defBlocks[bi].assignments=buildSuggest(defBlocks[bi].benchIdx,prev,pp,priorBlocks);
}
// Rebuild blocks startBi..2, treating any earlier block as a locked anchor.
// In Fair Play mode, locked blocks count toward IF/OF totals.
function autoSuggestAll(){autoSuggestFrom(0);}
function autoSuggestFrom(startBi){
  for(let bi=startBi;bi<3;bi++){
    const prev=bi>0?defBlocks[bi-1].assignments:null;
    const pp=bi>1?defBlocks[bi-2].assignments:null;
    const priorBlocks=bi>0?defBlocks.slice(0,bi).map(b=>({assignments:{...b.assignments}})):null;
    defBlocks[bi].assignments=buildSuggest(defBlocks[bi].benchIdx,prev,pp,priorBlocks);
  }
}
function getFairPlayCompliance(){
  const result={};
  roster.forEach((_,pi)=>{result[pi]={if:0,of:0};});
  defBlocks.forEach(block=>{Object.entries(block.assignments).forEach(([pos,pi])=>{if(IF_POS.has(pos))result[pi].if+=2;if(OF_POS.has(pos))result[pi].of+=2;});});
  return result;
}
function syncBatPos(pi,pos){const b=battingOrder.find(b=>b.idx===pi);if(b)b.batPos=pos;}
function manualDefAssign(bi,pos,newPi){
  const block=defBlocks[bi],oldPi=block.assignments[pos];
  const newCur=Object.entries(block.assignments).find(([p,v])=>v===newPi&&p!==pos)?.[0];
  if(newCur!==undefined){if(oldPi!==undefined){block.assignments[newCur]=oldPi;syncBatPos(oldPi,newCur);}else delete block.assignments[newCur];}
  Object.keys(block.assignments).forEach(p=>{if(p!==pos&&block.assignments[p]===newPi)delete block.assignments[p];});
  block.assignments[pos]=newPi;syncBatPos(newPi,pos);
  save();renderDefGrid(bi);renderBatting();
}

// ── GAME-DAY ABSENCES ───────────────────────────────────────────────────────
// gameAbsences maps rosterIdx → earliest inning the player is available.
// Options: undefined/absent = playing whole game (default),
//          1 = out whole game (conventionally stored as 99 or special, but we use "isOut")
//          3 = arriving Inn 3 (missed block 0)
//          5 = arriving Inn 5 (missed blocks 0 and 1)
// For "out whole game" we store a sentinel value 99.

const INNING_BLOCKS=[1,3,5]; // Inning numbers where each block starts
function absenceStatus(idx){
  const v=gameAbsences[idx];
  if(v===undefined)return{key:'playing',label:'Playing',cls:'playing'};
  if(v===99)return{key:'out',label:'Out (whole game)',cls:'out'};
  if(v===3)return{key:'late3',label:'Arriving Inn 3',cls:'late'};
  if(v===5)return{key:'late5',label:'Arriving Inn 5',cls:'late'};
  return{key:'playing',label:'Playing',cls:'playing'};
}
// Returns true if player is available during the given inning-block index (0/1/2)
function availableInBlock(idx,blockIdx){
  const v=gameAbsences[idx];
  if(v===undefined)return true;
  if(v===99)return false;
  // v is the inning number they arrive — block inning start must be >= v
  return INNING_BLOCKS[blockIdx]>=v;
}
function availableAllGame(idx){const v=gameAbsences[idx];return v===undefined;}
function absenceCounts(){
  let out=0,late=0,full=0;
  roster.forEach((_,i)=>{
    const s=absenceStatus(i);
    if(s.key==='out')out++;
    else if(s.key==='late3'||s.key==='late5')late++;
    else full++;
  });
  return{out,late,full};
}
function setAbsence(idx,key){
  if(key==='playing')delete gameAbsences[idx];
  else if(key==='out')gameAbsences[idx]=99;
  else if(key==='late3')gameAbsences[idx]=3;
  else if(key==='late5')gameAbsences[idx]=5;
  reconcileDefBlocksToMode();
  save();
  renderGameDay();renderBatting();
  // Re-render defense if visible — mode may have changed
  if(document.getElementById('sc-defense'))renderDefense();
}
function clearAllAbsences(){
  if(!Object.keys(gameAbsences).length)return;
  if(!confirm('Clear all absences? All players will be marked as playing the whole game.'))return;
  gameAbsences={};pendingGameRebuild=null;
  reconcileDefBlocksToMode();
  save();renderGameDay();renderBatting();showSaved();
  if(document.getElementById('sc-defense'))renderDefense();
}

// ── GAME-DAY REBUILD: batting order + per-block defense ─────────────────────
// Non-destructive preview. Returns {newBattingOrder, newDefBlocks, warnings}.
// Strategy:
//   - Batting: filter battingOrder to playing-all-game players first (preserves current order),
//              then append late-arriving players at the end. Out-all-game players are dropped.
//   - Defense: rebuild each block using only players available in that block; prefer benching
//              someone who'll otherwise play all three blocks, per fairness.
function buildGameDayPlan(){
  const warnings=[];

  // Batting order: keep currently-seated players who aren't out, preserve relative order,
  // then append any late arrivals that aren't already in the order.
  const keepSet=new Set();
  const newBat=[];
  battingOrder.forEach(b=>{
    const s=absenceStatus(b.idx);
    if(s.key==='out')return;
    newBat.push({idx:b.idx,batPos:b.batPos});
    keepSet.add(b.idx);
  });
  // Append any roster players not currently in battingOrder (shouldn't happen normally, but safe)
  roster.forEach((_,i)=>{
    if(keepSet.has(i))return;
    if(absenceStatus(i).key==='out')return;
    newBat.push({idx:i,batPos:'P'});
  });

  // Defense: per block, rebuild using available players
  const newBlocks=[];
  for(let bi=0;bi<3;bi++){
    const available=roster.map((_,i)=>i).filter(i=>availableInBlock(i,bi));
    if(available.length<10){
      warnings.push(`Inn ${INNING_BLOCKS[bi]}–${INNING_BLOCKS[bi]+1}: only ${available.length} players available (need 10 fielders + 1 bench)`);
      newBlocks.push({benchIdx:null,assignments:{},insufficient:true,availableCount:available.length});
      continue;
    }
    // Pick bench: prefer a player who is available in ALL blocks (so benching here spreads evenly)
    // and who has lowest effRank (weakest hitter benches first is rec-league convention;
    // but we rotate so we pick the player least recently benched).
    const benchCandidates=available.filter(i=>{
      // Check this player isn't also benched in a prior block we already assigned
      return !newBlocks.slice(0,bi).some(b=>b.benchIdx===i);
    });
    const benchPool=benchCandidates.length>0?benchCandidates:available;
    // Rotate fairly: pick the one with highest effRank (weakest) among those available everywhere
    const allGameAvail=benchPool.filter(i=>availableAllGame(i));
    const preferredBench=(allGameAvail.length>0?allGameAvail:benchPool)
      .sort((a,b)=>effRank(b)-effRank(a))[0];
    const benchIdx=preferredBench!==undefined?preferredBench:available[available.length-1];

    // Now build assignments using existing buildSuggest logic
    const prev=bi>0?newBlocks[bi-1].assignments:null;
    const pp=bi>1?newBlocks[bi-2].assignments:null;
    const priorBlocks=bi>0?newBlocks.slice(0,bi).map(b=>({assignments:b.assignments||{}})):null;
    // buildSuggest expects a roster-wide pool; we need to restrict it to `available`.
    // The existing function pulls from all roster except benchIdx — we'll wrap its output,
    // filtering out any assignment that goes to an unavailable player, then fill gaps from
    // the available pool.
    const raw=buildSuggest(benchIdx,prev,pp,priorBlocks);
    const assignments={};
    const usedPlayers=new Set([benchIdx]);
    // Accept raw assignments only if the player is available
    Object.entries(raw).forEach(([pos,pi])=>{
      if(available.includes(pi)&&!usedPlayers.has(pi)){
        assignments[pos]=pi;usedPlayers.add(pi);
      }
    });
    // Fill any unfilled positions from remaining available players
    const POS_ORDER=POS_PRI;
    POS_ORDER.forEach(pos=>{
      if(assignments[pos]!==undefined)return;
      const remaining=available.filter(i=>!usedPlayers.has(i));
      if(!remaining.length)return;
      // Pick the best fit for this position from remaining
      const best=remaining.sort((a,b)=>{
        const fa=(roster[a].strengths[pos]||0)*10+(10-effRank(a));
        const fb=(roster[b].strengths[pos]||0)*10+(10-effRank(b));
        return fb-fa;
      })[0];
      assignments[pos]=best;usedPlayers.add(best);
    });
    newBlocks.push({benchIdx,assignments});
  }

  return{newBattingOrder:newBat,newDefBlocks:newBlocks,warnings};
}

function showGameDayPreview(){
  pendingGameRebuild=buildGameDayPlan();
  renderGameDay();
}
function cancelGameDayPreview(){pendingGameRebuild=null;renderGameDay();}
function applyGameDayPreview(){
  if(!pendingGameRebuild)return;
  const {newBattingOrder,newDefBlocks,warnings}=pendingGameRebuild;
  if(warnings.length){
    if(!confirm('Some innings have fewer than 10 available players:\n\n'+warnings.join('\n')+'\n\nApply anyway? The short-handed innings will have empty positions you can fill manually.'))return;
  }
  battingOrder=newBattingOrder;
  defBlocks=newDefBlocks.map(b=>({
    benchIdx:b.benchIdx!==null?b.benchIdx:(roster.length-1),
    assignments:b.assignments||{}
  }));
  pendingGameRebuild=null;
  save();renderAll();showSaved();
  // Jump to BAT tab to show the result
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-batting').classList.add('active');
  const batBtn=document.querySelector('.tab-btn');if(batBtn)batBtn.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

  // Preview panel if a rebuild is pending

// ── BATTING ORDER SUGGESTION ENGINE ─────────────────────────────────────────
// OBP-first rec-league logic that builds a full lineup with reasoning.
// Slot intent:
//   1  Leadoff — highest OBP (gets on base, sets the table)
//   2  Two-hole — best AVG (contact hitter, moves leadoff over)
//   3  Three-hole — best overall bat (OBP + AVG blend, some power)
//   4  Cleanup — most XBH (drives runners in)
//   5  Protection — next-best OBP (extends rallies)
//   6  Situational — next-best AVG
//   7+ Remaining by descending OBP
// Fallback with no stats: manual draft rank order.
function suggestBattingOrder(){
  const pool=roster.map((_,i)=>i);
  const st=seasonTotals();
  const hasAnyStats=gameLog.length>0&&Object.values(st).some(s=>s&&(s.ab||0)>0);

  if(!hasAnyStats){
    const sorted=[...pool].sort((a,b)=>roster[a].rank-roster[b].rank);
    return sorted.map(idx=>{
      const existing=battingOrder.find(b=>b.idx===idx);
      return{idx,batPos:existing?existing.batPos:'P',role:'By draft rank'};
    });
  }

  const scored=pool.map(idx=>{
    const s=st[idx]||{};
    const qualifies=(s.ab||0)>=3||(s.pa||0)>=4;
    const xbh=(s.s2||0)+(s.s3||0)+(s.hr||0);
    return{
      idx,
      avg:qualifies&&s.ab>0?(s.avg||0):null,
      obp:qualifies&&s.pa>0?(s.obp||0):null,
      xbh,hasData:qualifies,rank:roster[idx].rank
    };
  });

  const withData=scored.filter(p=>p.hasData);
  const noData=scored.filter(p=>!p.hasData).sort((a,b)=>a.rank-b.rank);
  const result=[];
  const used=new Set();

  const pickBy=(scoreFn,role)=>{
    const cand=withData.filter(p=>!used.has(p.idx)).sort(scoreFn)[0];
    if(cand){result.push({idx:cand.idx,role});used.add(cand.idx);}
  };

  pickBy((a,b)=>(b.obp||0)-(a.obp||0),'Leadoff · top OBP');
  pickBy((a,b)=>{const d=(b.avg||0)-(a.avg||0);if(Math.abs(d)>0.001)return d;return(b.obp||0)-(a.obp||0);},'Contact · moves runners');
  pickBy((a,b)=>((b.obp||0)*1.2+(b.avg||0)+b.xbh*0.05)-((a.obp||0)*1.2+(a.avg||0)+a.xbh*0.05),'Best bat');
  pickBy((a,b)=>{const d=b.xbh-a.xbh;if(d!==0)return d;return(b.obp||0)-(a.obp||0);},'Cleanup · power');
  pickBy((a,b)=>(b.obp||0)-(a.obp||0),'Protection');
  pickBy((a,b)=>(b.avg||0)-(a.avg||0),'Situational');

  withData.filter(p=>!used.has(p.idx))
    .sort((a,b)=>{const d=(b.obp||0)-(a.obp||0);if(Math.abs(d)>0.001)return d;return(b.avg||0)-(a.avg||0);})
    .forEach(p=>{result.push({idx:p.idx,role:'Bottom of order'});used.add(p.idx);});

  noData.forEach(p=>{result.push({idx:p.idx,role:'No stats · by rank'});used.add(p.idx);});

  return result.map(p=>{
    const existing=battingOrder.find(b=>b.idx===p.idx);
    return{idx:p.idx,batPos:existing?existing.batPos:'P',role:p.role};
  });
}

function showOrderSuggestion(){

// ── RALLY KILLER DETECTION ─────────────────────────────────────────────────
// Flags a batter when they AND both neighbors all have L3 OBP < .250.
// Requires 2+ games of data and 2+ PA in the recent window for all three.
function isRallyKiller(i){
  if(gameLog.length<2)return false;
  const r=recentStats(3);
  const n=battingOrder.length;
  if(n<3)return false;
  const prev=battingOrder[(i-1+n)%n];
  const cur=battingOrder[i];
  const next=battingOrder[(i+1)%n];
  const obp=idx=>{const s=r[idx];return s&&s.pa>=2?(s.obp||0):null;};
  const pO=obp(prev.idx),cO=obp(cur.idx),nO=obp(next.idx);
  if(pO===null||cO===null||nO===null)return false;
  return pO<0.25&&cO<0.25&&nO<0.25;
}

// ── ROSTER MANAGEMENT ─────────────────────────────────────────────────────
// All roster edits flow through these helpers so downstream references
// (batting order, defense assignments, bench, awards, game log) stay consistent.

function renamePlayer(idx,newName){
  if(!roster[idx])return;
  roster[idx].name=(newName||'').trim()||roster[idx].name;
  save();
}

function updatePlayerRank(idx,newRank){
  if(!roster[idx])return;
  roster[idx].rank=Math.max(1,parseInt(newRank,10)||roster[idx].rank);
  save();
}

function updatePlayerAge(idx,newAge){
  if(!roster[idx])return;
  roster[idx].age=Math.max(6,Math.min(14,parseInt(newAge,10)||roster[idx].age));
  save();
}

function addPlayer(name,rank,age){
  name=(name||'').trim();
  if(!name){alert('Please enter a name.');return false;}
  if(roster.length>=20){alert('Roster is full (20 max).');return false;}
  const newIdx=roster.length;
  roster.push({
    name,
    rank:Math.max(1,parseInt(rank,10)||(roster.length+1)),
    age:Math.max(6,Math.min(14,parseInt(age,10)||10)),
    strengths:{} // blank — coach sets in the position grid
  });
  // Append to batting order at the end
  battingOrder.push({idx:newIdx,batPos:'P'});
  save();
  return true;
}

function removePlayer(idx){
  if(roster.length<=9){
    alert('Cannot remove — you need at least 9 players for a full defense.');
    return;
  }
  if(!confirm(`Remove ${roster[idx].name} from the roster?\n\nThis will also remove them from the batting order, defense assignments, and clear any award nominations. Stats will remain in the game log but won't display.`))return;

  // Remove from roster
  roster.splice(idx,1);

  // Reindex batting order: drop the removed player, shift all higher idx down by 1
  battingOrder=battingOrder.filter(b=>b.idx!==idx).map(b=>({...b,idx:b.idx>idx?b.idx-1:b.idx}));

  // Reindex defense blocks
  defBlocks=defBlocks.map(block=>{
    const newBench=block.benchIdx===idx
      ? (roster.length>0?Math.min(block.benchIdx,roster.length-1):0)
      : (block.benchIdx>idx?block.benchIdx-1:block.benchIdx);
    const newAssignments={};
    Object.entries(block.assignments).forEach(([pos,pi])=>{
      if(pi===idx)return; // drop assignment to removed player
      newAssignments[pos]=pi>idx?pi-1:pi;
    });
    return{benchIdx:newBench,assignments:newAssignments};
  });

  // Clear award overrides that pointed to the removed player; shift others
  const newOverrides={};
  Object.entries(awardOverrides).forEach(([aid,val])=>{
    const v=parseInt(val,10);
    if(v===idx)return; // drop — coach will re-pick
    newOverrides[aid]=String(v>idx?v-1:v);
  });
  awardOverrides=newOverrides;

  // Reindex game log cumulative totals
  gameLog=gameLog.map(g=>{
    const newCum={};
    Object.entries(g.cumTotals||{}).forEach(([pi,stats])=>{
      const p=parseInt(pi,10);
      if(p===idx)return; // drop stats for removed player
      newCum[p>idx?p-1:p]=stats;
    });
    return{...g,cumTotals:newCum};
  });

  // Reindex gameAbsences — drop the removed player, shift higher indices down
  const newAbsences={};
  Object.entries(gameAbsences).forEach(([pi,val])=>{
    const p=parseInt(pi,10);
    if(p===idx)return;
    newAbsences[p>idx?p-1:p]=val;
  });
  gameAbsences=newAbsences;

  save();renderAll();showSaved();
}

// ── BACKUP / RESTORE ──────────────────────────────────────────────────────
function backupData(){
  const payload={
    exportedAt:new Date().toISOString(),
    exportVersion:1,
    appVersion:'haungs-10b-v1',
    data:{roster,battingOrder,defBlocks,gameLog,awardOverrides,awardNotes,awardBlurbs,fairPlayMode}
  };
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const d=new Date();
  const stamp=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const fname=`chili-peppers-backup-${stamp}.json`;

  // Try native share sheet first (iOS/Android), fall back to download
  if(navigator.share&&navigator.canShare){
    try{
      const file=new File([blob],fname,{type:'application/json'});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'Red Hot Chili Peppers Backup',text:`Backup from ${stamp}`})
          .catch(()=>{triggerDownload(url,fname);});
        setTimeout(()=>URL.revokeObjectURL(url),60000);
        return;
      }
    }catch(e){}
  }
  triggerDownload(url,fname);
}

function triggerDownload(url,fname){
  const a=document.createElement('a');a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
}

function restoreData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      const d=parsed.data||parsed; // allow raw or wrapped
      if(!d.roster||!Array.isArray(d.roster)){
        alert('This does not look like a valid backup file for this app.');
        return;
      }
      const playerCount=d.roster.length;
      const gameCount=(d.gameLog||[]).length;
      if(!confirm(`Restore backup?\n\n• ${playerCount} players\n• ${gameCount} game${gameCount!==1?'s':''} of stats\n• All current data will be REPLACED.\n\nA safety backup of your current data will download first.`))return;
      // Safety backup of current state first
      backupData();
      setTimeout(()=>{
        if(d.roster)roster=d.roster;
        if(d.battingOrder)battingOrder=d.battingOrder;
        if(d.defBlocks)defBlocks=d.defBlocks;
        if(d.gameLog)gameLog=d.gameLog;
        if(d.awardOverrides)awardOverrides=d.awardOverrides;
        if(d.awardNotes)awardNotes=d.awardNotes;
        if(d.awardBlurbs)awardBlurbs=d.awardBlurbs;
        if(typeof d.fairPlayMode==='boolean')fairPlayMode=d.fairPlayMode;
        save();renderAll();showSaved();
        alert('✓ Backup restored.');
      },600);
    }catch(err){
      alert('Could not read backup file: '+err.message);
    }
  };
  reader.readAsText(file);
  input.value=''; // reset so same file can be re-picked
}

// ── BATTING TAB ───────────────────────────────────────────────────────────────
// Returns the set of positions actually used by this player in inning block 1 (innings 1-2)
// Only block 0 matters — that's the player's "starting position".
// The bench player for block 0 gets EH.
function getStartingPos(playerIdx) {
  // If this player is on the bench for innings 1-2, they are EH
  if (defBlocks[0].benchIdx === playerIdx) return 'EH';
  // Otherwise, look up their position in block 0 assignments
  const pos = Object.entries(defBlocks[0].assignments).find(([,pi])=>pi===playerIdx)?.[0];
  return pos || battingOrder.find(b=>b.idx===playerIdx)?.batPos || 'P';
}

function haptic(type){if(!navigator.vibrate)return;if(type==='activate')navigator.vibrate([15,10,15]);else if(type==='drop')navigator.vibrate(8);else if(type==='tick')navigator.vibrate(4);}

function createGhost(row,touchY){
  removeGhost();
  rowRects=[];
  document.querySelectorAll('#sc-batting .brow:not(.drag-ghost)').forEach(r=>{
    const rect=r.getBoundingClientRect();
    rowRects.push({idx:+r.dataset.i,top:rect.top,bottom:rect.bottom,el:r});
  });
  const rect=row.getBoundingClientRect();
  ghostOffsetY=touchY-rect.top;
  dragRowH=rect.height;
  document.querySelectorAll('#sc-batting .brow').forEach(r=>r.style.setProperty('--row-h',dragRowH+'px'));
  lastDestIdx=null;rafPending=false;
  ghostEl=row.cloneNode(true);
  ghostEl.className='brow drag-ghost';
  ghostEl.style.width=rect.width+'px';
  ghostEl.style.top=(touchY-ghostOffsetY)+'px';
  ghostEl.style.left=rect.left+'px';
  document.body.appendChild(ghostEl);
}
function removeGhost(){if(ghostEl){ghostEl.remove();ghostEl=null;}rowRects=[];}
function getDropTarget(touchX,touchY,sourceRow){for(const r of rowRects){if(r.el===sourceRow)continue;if(touchY>=r.top&&touchY<=r.bottom)return r.idx;}return null;}
function applyShifts(srcIdx,destIdx){
  const rows=[...document.querySelectorAll('#sc-batting .brow:not(.drag-ghost)')];
  rows.forEach(r=>{r.classList.remove('shift-down','shift-up');if(r.classList.contains('dragging'))return;const ri=+r.dataset.i;if(srcIdx<destIdx){if(ri>srcIdx&&ri<=destIdx)r.classList.add('shift-up');}else{if(ri>=destIdx&&ri<srcIdx)r.classList.add('shift-down');}});
}
function removeHighlights(){document.querySelectorAll('.brow').forEach(r=>r.classList.remove('drag-over','drop-above','drop-below','shift-down','shift-up'));}

function countChanges(bi){if(!bi||!defBlocks[bi-1])return 10;const prev=defBlocks[bi-1].assignments,cur=defBlocks[bi].assignments,pm={};Object.entries(prev).forEach(([p,pi])=>pm[pi]=p);let c=0;Object.entries(cur).forEach(([p,pi])=>{if(pm[pi]!==p)c++;});return c;}
// Track which cell is selected for swapping: {bi, pos} or null
let swapSource=null;
function clearSwapState(){swapSource=null;}
function renderDefGrid(bi){
  const grid=document.getElementById(`dgrid-${bi}`);if(!grid)return;grid.innerHTML='';
  const block=defBlocks[bi];
  const oldBadge=grid.parentElement.querySelector('.rot-badge');if(oldBadge)oldBadge.remove();
  const oldHint=grid.parentElement.querySelector('.swap-hint');if(oldHint)oldHint.remove();
  if(bi>0){const ch=countChanges(bi),total=Object.keys(block.assignments).length;const badge=document.createElement('div');badge.className='rot-badge '+(ch>total/2?'rot-good':'rot-warn');badge.textContent=ch>total/2?`✓ ${ch}/${total} POSITIONS ROTATED`:`⚠ ONLY ${ch}/${total} ROTATED`;grid.parentElement.insertBefore(badge,grid);}
  // Swap hint bar
  const hint=document.createElement('div');hint.className='swap-hint'+(swapSource&&swapSource.bi===bi?' show':'');
  hint.textContent=swapSource&&swapSource.bi===bi?'TAP ANOTHER POSITION TO SWAP ↔':'';
  grid.parentElement.insertBefore(hint,grid);
  const seen=new Set();
  // Only players actually available for this block (not OUT)
  const activePool=roster.map((_,i)=>i).filter(i=>!isOutWholeGame(i));
  const positions=activeFieldPositions();
  const usingBench=benchNeeded();
  positions.forEach(pos=>{
    const ai=block.assignments[pos],cell=document.createElement('div');
    const isSwapSrc=swapSource&&swapSource.bi===bi&&swapSource.pos===pos;
    const isSwapTgt=swapSource&&swapSource.bi===bi&&!isSwapSrc;
    cell.className='def-cell'+(isSwapSrc?' swap-source':isSwapTgt?' swap-target':'');
    const f=ai!==undefined?fit(ai,pos):0,dotCls=f===2?'fit-dot fit-g':f===1?'fit-dot fit-o':'fit-dot fit-w';
    const dup=ai!==undefined&&seen.has(ai);if(ai!==undefined)seen.add(ai);
    // Build player select — exclude OUT players, and bench only if bench is in use
    const playerOpts=activePool.map(i=>(usingBench&&i===block.benchIdx)?'':`<option value="${i}" ${i===ai?'selected':''}>${fn(i)}</option>`).join('');
    const placeholder=ai===undefined?`<option value="" selected disabled>— open —</option>`:'';
    const pOpts=placeholder+playerOpts;
    const dotShown=ai!==undefined?dotCls:'fit-dot';
    cell.innerHTML=`<div class="def-pos" ${dup?'style="color:var(--bad)"':''}>${pos}${dup?' ⚠':''}</div><select class="def-psel" onchange="if(this.value!==''){manualDefAssign(${bi},'${pos}',+this.value);clearSwapState();}">${pOpts}</select><div class="${dotShown}"></div>`;
    // Tap cell body (not select) for swap
    cell.addEventListener('click',e=>{
      if(e.target.tagName==='SELECT')return;
      if(swapSource&&swapSource.bi===bi&&swapSource.pos!==pos){
        // Execute swap
        const sp=swapSource.pos,ta=block.assignments[sp],sa=block.assignments[pos];
        block.assignments[sp]=sa;block.assignments[pos]=ta;
        if(ta!==undefined)syncBatPos(ta,pos);
        if(sa!==undefined)syncBatPos(sa,sp);
        swapSource=null;save();renderDefGrid(bi);renderBatting();refreshComplianceChips();
      } else if(swapSource&&swapSource.bi===bi&&swapSource.pos===pos){
        // Tap same cell again = cancel
        swapSource=null;renderDefGrid(bi);
      } else {
        // Select this cell as swap source
        swapSource={bi,pos};renderDefGrid(bi);
      }
    });
    grid.appendChild(cell);
  });
}

function setBench(bi,pi){
  if(!benchNeeded())return; // No bench in current mode
  const old=defBlocks[bi].benchIdx;
  const taken=Object.entries(defBlocks[bi].assignments).find(([,v])=>v===pi);
  if(taken){defBlocks[bi].assignments[taken[0]]=old;syncBatPos(old,taken[0]);}
  defBlocks[bi].benchIdx=pi;
  // EH assignment: block 0 bench player => EH in batting order
  if(bi===0){
    battingOrder.forEach(b=>{if(b.idx===pi)b.batPos='EH';if(b.idx===old&&old!==pi)b.batPos=getStartingPos(old);});
  }
  const tag=document.getElementById(`btag-${bi}`);if(tag)tag.textContent='BENCH: '+fn(pi);
  save();renderDefGrid(bi);renderBatting();refreshComplianceChips();
}
// Suggest rebuilds ONLY the tapped block.
// Earlier blocks contribute as locked context (rotation diversity + fair-play counts).
// Later blocks are left untouched — if the user wants to refresh them, they tap Suggest there.
function doSuggest(bi){
  reconcileDefBlocksToMode();
  const usingBench=benchNeeded();
  const tagText=(i)=>usingBench?'BENCH: '+fn(defBlocks[i].benchIdx):'EVERYONE PLAYING';
  // Single-block rebuild — preserves all other blocks' edits
  autoSuggest(bi);
  const tag=document.getElementById(`btag-${bi}`);if(tag)tag.textContent=tagText(bi);
  renderDefGrid(bi);
  // Sync batting positions only when block 0 was the one re-suggested
  if(bi===0&&defBlocks[0].assignments){Object.entries(defBlocks[0].assignments).forEach(([pos,pi])=>syncBatPos(pi,pos));renderBatting();}
  save();refreshComplianceChips();
}

  const banner=sc.querySelector('.fp-banner');if(banner)banner.after(chips);else sc.insertBefore(chips,sc.children[1]||null);

  const cb=document.createElement('button');cb.className='btn-clear';cb.textContent='✕ CLEAR ALL GAME DATA';cb.onclick=()=>{if(confirm('Clear all game data?')){gameLog=[];save();renderStats();}};sc.appendChild(cb);

  const st=seasonTotals(),rc=recentStats(3);
  const sorted=roster.map((_,i)=>i).filter(i=>st[i]&&st[i].ab>0).sort((a,b)=>(st[b].avg||0)-(st[a].avg||0));
  const noStats=roster.map((_,i)=>i).filter(i=>!st[i]||!st[i].ab);
  [...sorted,...noStats].forEach(ri=>{const p=roster[ri],s=st[ri];const row=document.createElement('div');row.className='stat-row';if(!s||!s.ab){row.innerHTML=`<div><div class="sp">${fn(ri)}</div><div class="ssub">No data</div></div><div class="sv lo">—</div><div class="sv lo">—</div><div class="sv lo">—</div><div class="sv lo">—</div><div class="sv lo">—</div><div class="sv lo">—</div>`;}else{const ac=s.avg>=0.35?'sv ba hi':s.avg>=0.25?'sv ba mid':'sv ba lo',oc=s.obp>=0.4?'sv hi':s.obp>=0.3?'sv mid':'sv lo',streak=streakLabel(ri),tHtml=streak?`<span class="sstreak ${streak.cls}">${streak.label.split(' ')[0]}</span>`:`<span class="sv lo">—</span>`;row.innerHTML=`<div><div class="sp">${fn(ri)}</div><div class="ssub">${s.gp} GP</div></div><div class="${ac}">${s.avg.toFixed(3)}</div><div class="${oc}">${s.obp.toFixed(3)}</div><div class="sv">${s.h}</div><div class="sv">${s.ab}</div><div class="sv">${s.sb||0}</div><div style="text-align:center">${tHtml}</div>`;}sc.appendChild(row);});

function setImgStatus(msg,color){const el=document.getElementById('imgStatus');if(el){el.textContent=msg||'';if(color)el.style.color=color;else el.style.color='var(--muted)';}}

// Lazy-load PDF.js from CDN on demand
let _pdfjsPromise=null;
function loadPdfJs(){
  if(window.pdfjsLib)return Promise.resolve(window.pdfjsLib);
  if(_pdfjsPromise)return _pdfjsPromise;
  _pdfjsPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{
      if(!window.pdfjsLib){reject(new Error('PDF.js failed to load'));return;}
      window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve(window.pdfjsLib);
    };
    s.onerror=()=>reject(new Error('Could not load PDF reader'));
    document.head.appendChild(s);
  });
  return _pdfjsPromise;
}

// Convert first page of PDF to base64 PNG
async function pdfToPng(file){
  const pdfjsLib=await loadPdfJs();
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const page=await pdf.getPage(1);
  // Target ~1600px wide for good OCR readability
  const v1=page.getViewport({scale:1});
  const scale=Math.min(2.5,Math.max(1.2,1600/v1.width));
  const viewport=page.getViewport({scale});
  const canvas=document.createElement('canvas');
  canvas.width=viewport.width;canvas.height=viewport.height;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);
  await page.render({canvasContext:ctx,viewport}).promise;
  const dataUrl=canvas.toDataURL('image/png');
  return dataUrl.split(',')[1];
}

// Re-encode uploaded image through a canvas to normalize and downscale if needed
async function prepImageFile(file){
  return new Promise((resolve,reject)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      try{
        const maxDim=2000;
        let w=img.naturalWidth,h=img.naturalHeight;
        if(Math.max(w,h)>maxDim){const s=maxDim/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#ffffff';ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.88);
        URL.revokeObjectURL(url);
        resolve({base64:dataUrl.split(',')[1],mediaType:'image/jpeg'});
      }catch(err){URL.revokeObjectURL(url);reject(err);}
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('Image could not be decoded'));};
    img.src=url;
  });
}
