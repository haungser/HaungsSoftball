function _catKey(award){
  const c=award.cat;
  if(c==='cat-stat')return 'stat';
  if(c==='cat-def')return 'def';
  if(c==='cat-spirit')return 'spirit';
  if(c==='cat-growth')return 'growth';
  if(c==='cat-team')return 'team';
  if(c==='cat-fun')return 'fun';
  return 'stat';
}

// Generate blurb. variant cycles 0/1/2 for reroll.
function genBlurb(award,wi,note,variant){
  const f=_statFacts(wi);
  const key=_catKey(award);
  const bank=BLURB_VARIANTS[key]||BLURB_VARIANTS.stat;
  const v=((variant||0)%bank.length+bank.length)%bank.length;
  const cleanNote=(note||'').trim().replace(/\.$/,'');
  return bank[v](f,cleanNote?cleanNote+'.':'');
}

function rerollBlurb(awardId,winnerIdx){
  const award=AWARDS.find(a=>a.id===awardId);if(!award)return;
  const bank=BLURB_VARIANTS[_catKey(award)]||BLURB_VARIANTS.stat;
  const cur=awardBlurbVariants[awardId]||0;
  const next=(cur+1)%bank.length;
  awardBlurbVariants[awardId]=next;
  awardBlurbs[awardId]=genBlurb(award,winnerIdx,awardNotes[awardId]||'',next);
  save();renderAwards();
}

        <td style="padding:5px 8px;font-size:12pt;font-weight:900;color:#C22818;text-align:right;border-bottom:1px solid #eee;white-space:nowrap;width:38px;">${pos}</td>
      </tr>`).join('');
    return `<td style="vertical-align:top;padding:0 4px;width:33.3%;">
      <table style="width:100%;border-collapse:collapse;border:2px solid #ddd;border-radius:5px;overflow:hidden;">
        <tr><td colspan="2" style="background:#C22818;color:#fff;font-size:11pt;font-weight:900;letter-spacing:2px;padding:6px 8px;text-align:center;">${label}</td></tr>
        <tr><td colspan="2" style="background:#fff3f3;color:#C22818;font-size:7.5pt;font-weight:700;letter-spacing:1px;padding:3px 8px;border-bottom:1px solid #fcc;text-align:center;">BENCH: ${benchName}</td></tr>
        ${rows}
      </table></td>`;
  }).join('');

  card.innerHTML=`
    <div style="font-family:'Barlow Condensed','Arial Narrow',sans-serif;color:#000;background:#fff;">
      <!-- Header -->
      <table style="width:100%;border-collapse:collapse;border-bottom:3px solid #C22818;margin-bottom:10px;">
        <tr>
          <td style="padding-bottom:5px;">
            <div style="font-size:18pt;font-weight:900;color:#C22818;letter-spacing:1px;line-height:1;">🌶️ RED HOT CHILI PEPPERS</div>
            <div style="font-size:8pt;letter-spacing:3px;color:#555;margin-top:3px;">TVL MINORS 10B · GAME DAY</div>
          </td>
          <td style="text-align:right;padding-bottom:5px;white-space:nowrap;">
            <div style="font-size:11pt;font-weight:800;">${todayLong}</div>
            <div style="font-size:9pt;color:#555;">vs. ____________________ &nbsp; &#9744; Home &nbsp; &#9744; Away</div>
          </td>
        </tr>
      </table>

      <!-- Two-column body: batting order left, defense right -->
      <table style="width:100%;border-collapse:collapse;table-layout:fixed;">
        <tr>
          <!-- LEFT: Batting order -->
          <td style="vertical-align:top;width:38%;padding-right:10px;border-right:1.5px dashed #ccc;">
            <div style="font-size:9pt;font-weight:900;letter-spacing:3px;color:#C22818;text-align:center;background:#fff3f3;padding:5px;border-radius:4px;margin-bottom:5px;">BATTING ORDER</div>
            <table style="width:100%;border-collapse:collapse;">${batRows}</table>
          </td>

          <!-- RIGHT: Defense -->
          <td style="vertical-align:top;width:62%;padding-left:10px;">
            <div style="font-size:9pt;font-weight:900;letter-spacing:3px;color:#C22818;text-align:center;background:#fff3f3;padding:5px;border-radius:4px;margin-bottom:5px;">DEFENSE BY INNING — FIND YOUR NAME → FIND YOUR POSITION</div>
            <table style="width:100%;border-collapse:collapse;"><tr>${defColsHTML}</tr></table>
          </td>
        </tr>
      </table>

      <!-- Footer -->
      <div style="margin-top:10px;border-top:1px solid #ddd;padding-top:4px;display:flex;justify-content:space-between;font-size:6.5pt;color:#bbb;letter-spacing:1px;">
        <span>🌶️ RED HOT CHILI PEPPERS · TVL MINORS 10B</span>
        <span>Post in dugout — check position each inning change</span>
        <span>${todayLong}</span>
      </div>
    </div>`;
  window.print();
}

function _setPrintPage(orientation){const e=document.getElementById('_print_page_style');if(e)e.remove();const s=document.createElement('style');s.id='_print_page_style';s.textContent=`@media print { @page { size: letter ${orientation}; margin:0.35in; @top-left{content:none} @top-center{content:none} @top-right{content:none} @bottom-left{content:none} @bottom-center{content:none} @bottom-right{content:none} } }`;document.head.appendChild(s);}

// ── EXPORT AWARDS CEREMONY PDF ──────────────────────────────────────────────
function exportCeremony(){
  _setPrintPage('portrait');
  const card=document.getElementById('pdf-card');
  const today=new Date();
  const year=today.getFullYear();
  const dateStr=today.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

  // Group awards by section — reorders to create a narrative arc for the ceremony
  const sections=[
    {label:'OFFENSE',keys:['cat-stat']},
    {label:'DEFENSE',keys:['cat-def']},
    {label:'GROWTH',keys:['cat-growth']},
    {label:'TEAM SPIRIT',keys:['cat-spirit','cat-fun']},
    {label:'LEADERSHIP',keys:['cat-team']}
  ];

  const winnerFor=(award)=>{
    const override=awardOverrides[award.id];
    if(override!==undefined)return+override;
    const noms=award.auto();
    return noms.length?noms[0].idx:null;
  };

  const blurbFor=(award)=>{
    const wi=winnerFor(award);
    if(wi===null)return null;
    if(awardBlurbs[award.id])return awardBlurbs[award.id];
    // Auto-generate if missing so the ceremony page is never blank
    return genBlurb(award,wi,awardNotes[award.id]||'',awardBlurbVariants[award.id]||0);
  };

  const sectionsHTML=sections.map(sec=>{
    const awardsInSection=AWARDS.filter(a=>sec.keys.includes(a.cat));
    const rows=awardsInSection.map(award=>{
      const wi=winnerFor(award);
      if(wi===null){
        return `<div class="pdf-award-row">
          <div class="pdf-award-emoji">${award.emoji}</div>
          <div class="pdf-award-body">
            <div class="pdf-award-name">${award.name}</div>
            <div style="font-size:9pt;color:#999;font-style:italic;margin-top:3px;">— to be announced —</div>
          </div>
        </div>`;
      }
      const blurb=blurbFor(award)||'';
      return `<div class="pdf-award-row">
        <div class="pdf-award-emoji">${award.emoji}</div>
        <div class="pdf-award-body">
          <div class="pdf-award-name">${award.name}</div>
          <div class="pdf-award-winner">${roster[wi].name}</div>
          <div class="pdf-award-blurb">${blurb}</div>
        </div>
      </div>`;
    }).join('');
    if(!rows)return '';
    return `<div class="pdf-ceremony-section">${sec.label}</div>${rows}`;
  }).join('');

  card.innerHTML=`<div class="pdf-ceremony">
    <div class="pdf-ceremony-hdr">
      <div class="pdf-ceremony-title" style="font-size:20pt;">🌶️ RED HOT CHILI PEPPERS</div>
      <div class="pdf-ceremony-sub">SEASON ${year} · AWARDS CEREMONY</div>
      <div class="pdf-ceremony-year">TVL MINORS 10B · ${dateStr}</div>
    </div>
    ${sectionsHTML}
    <div style="margin-top:22px;padding-top:10px;border-top:1.5px solid #C22818;text-align:center;font-size:9pt;color:#555;font-style:italic;line-height:1.6;">
      Every player on this roster earned her place here — on the field, in the dugout, and in the hearts of her teammates. This has been a privilege to coach.
    </div>
  </div>`;
  window.print();
}

// ── OFFLINE ───────────────────────────────────────────────────────────────────
function updateOnline(){const b=document.getElementById('offlineBar');if(b)b.classList.toggle('show',!navigator.onLine);}
window.addEventListener('online',updateOnline);window.addEventListener('offline',updateOnline);

// ── NO SERVICE WORKER ─────────────────────────────────────────────────────────
// Aggressive cleanup: unregister ANY existing service worker on this hostname
// and wipe ALL caches. We do NOT register a new SW — every future page load
// goes straight to Vercel, which has cache-control headers via vercel.json
// that handle browser caching properly. Offline mode is sacrificed for
// guaranteed fresh updates on every device, every time.
window.addEventListener('load',()=>{
  if(!('serviceWorker' in navigator))return;
  try{
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>r.unregister());
    }).catch(()=>{});
    if(self.caches){
      caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{});
    }
  }catch(e){}
});

// ── INIT ──────────────────────────────────────────────────────────────────────
function renderAll(){renderBatting();renderDefense();renderGameDay();renderSettings();renderStats();renderAwards();}
load();
applyGameDayInitialState();
defBlocks.forEach((b,bi)=>{if(!Object.keys(b.assignments).length)autoSuggest(bi);});
renderAll();
updateOnline();
</script>
